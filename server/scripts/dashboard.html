        <span class="e-value" style="color:${totalEarning != null ? 'var(--green)' : 'var(--muted)'}">${earnFmt}</span>
      </div>
      <span style="color:var(--muted);font-size:16px;align-self:center">→</span>
      <div class="earnings-stat">
        <span class="e-label">Est. 24h</span>
        <span class="e-value" style="color:${totalEarning != null ? 'var(--purple)' : 'var(--muted)'}">${est24Fmt}</span>
      </div>`;

    const walletSection = walletList.join('<div class="earnings-divider"></div>');

    let walletStatusHtml = '';
    if (walletsError != null) {
      walletStatusHtml = `<span style="font-size:10px;color:var(--orange)">⚠ balance error: ${walletsError}</span>`;
    } else if (walletsFetchedAt) {
      const ago = Math.round((Date.now() - new Date(walletsFetchedAt).getTime()) / 60000);
      walletStatusHtml = `<span style="font-size:10px;color:var(--muted)">balance updated ${ago}m ago</span>`;
    }

    wrap.innerHTML = `<div class="earnings-bar nowrap">
      ${earningSection}
      <div class="earnings-divider"></div>
      <div class="clore-wallet-group" style="display:flex;align-items:flex-start;gap:24px;flex-wrap:nowrap">
        ${walletSection}
        <button class="eye-btn" id="clore-balance-eye-btn" onclick="toggleCloreBalance()" title="Show/hide balance" style="align-self:center">${cloreBalanceVisible ? eyeOpenSvg : eyeOffSvg}</button>
      </div>
      ${walletStatusHtml ? `<span style="margin-left:auto;align-self:center">${walletStatusHtml}</span>` : ''}
    </div>`;
  }

  function renderCloreServerCard(s, view) {
    const statusIcon = !s.online ? '🔴' : !s.rented ? '🟠' : '🟢';
    const warnIcon = s.working_properly === false ? `<span title="Not working properly" style="font-size:13px;margin-right:2px">⚠️</span>` : '';

    const reliabilityBadge = s.reliability != null
      ? `<span class="earning-badge dim">${Math.round(s.reliability * 100)}%</span>`
      : '';
    const remainingBadge = s.rented && s.remaining_h != null
      ? `<span class="earning-badge dim">${(s.remaining_h / 24).toFixed(1)}d</span>`
      : '';
    const earningBadge = s.rented && s.price_usd != null
      ? `<span class="earning-badge">$${s.price_usd.toFixed(2)}/hr</span>`
      : `<span class="earning-badge dim">${s.online ? 'idle' : 'offline'}</span>`;

    // GPU blocks: name from Clore gpu_array, temps from HiveOS
    const hiveGpus = s.hive?.gpus || [];
    const isNormal = view === 'normal' || view === 'detailed';

    const gpuBlocks = (s.gpu_array || []).map((gpuName, i) => {
      const hg = hiveGpus[i] || {};

      if (isNormal) {
        // Normal view: bar rows like Salad
        const tc = tempClass(hg.temperature_c);
        const mc = tempClass(hg.mem_temp_c);
        const tempBarColor = tc === 'crit' ? 'red' : tc === 'hot' ? 'orange' : tc === 'warm' ? 'yellow' : 'green';
        const memBarColor  = mc === 'crit' ? 'red' : mc === 'hot' ? 'orange' : mc === 'warm' ? 'yellow' : 'green';

        let rows = `<div class="section-label" style="margin-top:6px">GPU · ${gpuName}</div>`;
        if (hg.temperature_c != null) rows += `
          <div class="row">
            <span class="label" style="min-width:58px">GPU Temp</span>
            <div class="bar-wrap"><div class="bar-fill ${tempBarColor}" style="width:${Math.min(100, hg.temperature_c / 110 * 100)}%"></div></div>
            <span class="val ${tc}">${hg.temperature_c}°C</span>
          </div>`;
        if (hg.mem_temp_c != null) rows += `
          <div class="row">
            <span class="label" style="min-width:58px">Mem Temp</span>
            <div class="bar-wrap"><div class="bar-fill ${memBarColor}" style="width:${Math.min(100, hg.mem_temp_c / 110 * 100)}%"></div></div>
            <span class="val ${mc}">${hg.mem_temp_c}°C</span>
          </div>`;
        if (hg.fan_pct != null) rows += `
          <div class="row">
            <span class="label">Fan</span>
            <div class="bar-wrap"><div class="bar-fill neutral" style="width:${Math.min(100, hg.fan_pct)}%"></div></div>
            <span class="val">${hg.fan_pct}%</span>
          </div>`;
        if (hg.power_w != null) rows += `
          <div class="row">
            <span class="label">Power</span>
            <div class="bar-wrap"><div class="bar-fill neutral" style="width:${Math.min(100, hg.power_w / 400 * 100)}%"></div></div>
            <span class="val">${hg.power_w}W</span>
          </div>`;
        return `<div class="clore-gpu-block">${rows}</div>`;
      }

      // Compact view: inline cgs spans
      const items = [
        hg.temperature_c != null ? `<span class="clore-cgs-item" style="color:${tempColor(hg.temperature_c)}" title="GPU Temp"><span class="clore-cgs-key">T</span>${hg.temperature_c}°</span>` : '',
        hg.mem_temp_c    != null ? `<span class="clore-cgs-item" style="color:${tempColor(hg.mem_temp_c)}" title="Mem Temp"><span class="clore-cgs-key">M</span>${hg.mem_temp_c}°</span>` : '',
        hg.fan_pct       != null ? `<span class="clore-cgs-item" style="color:var(--muted)" title="Fan"><span class="clore-cgs-key">F</span>${hg.fan_pct}%</span>` : '',
        hg.power_w       != null ? `<span class="clore-cgs-item" title="Power"><span class="clore-cgs-key">P</span>${hg.power_w}W</span>` : '',
      ].filter(Boolean).join('');
      return `<div class="clore-gpu-block">
        <span class="clore-gpu-name">${gpuName}</span>
        ${items ? `<div class="clore-cgs">${items}</div>` : ''}
      </div>`;
    }).join('');

    const totalPower = s.hive?.total_power_w;
    const sysRow = view === 'compact' ? '' : [
      totalPower           != null ? `<span>${totalPower}W total</span>` : '',
      s.hive?.uptime_hours != null ? `<span>Up ${s.hive.uptime_hours}h</span>` : '',
    ].filter(Boolean).join('');

    const cpuRamRows = isNormal ? [
      s.cpu    ? `<div class="hostname normal-only">${s.cpu}</div>` : '',
      s.ram_gb != null ? `<div class="hostname normal-only">${Math.round(s.ram_gb)}GB RAM</div>` : '',
    ].join('') : '';

    const netSection = view === 'detailed' && (s.net_down != null || s.net_up != null) ? (() => {
      const maxMbps = 10000;
      let html = `<hr class="divider"><div class="section-label">Network</div>`;
      if (s.net_down != null) html += `
        <div class="row">
          <span class="label">Download</span>
          <div class="bar-wrap"><div class="bar-fill neutral" style="width:${Math.min(100, s.net_down / maxMbps * 100)}%"></div></div>
          <span class="val" style="color:#9bc9ff">${s.net_down} Mbps <span class="arr-dn">⬇</span></span>
        </div>`;
      if (s.net_up != null) html += `
        <div class="row">
          <span class="label">Upload</span>
          <div class="bar-wrap"><div class="bar-fill neutral" style="width:${Math.min(100, s.net_up / maxMbps * 100)}%"></div></div>
          <span class="val" style="color:#80bf89">${s.net_up} Mbps <span class="arr-up">⬆</span></span>
        </div>`;
      return html;
    })() : '';

    const cardClass = !s.online ? 'offline' : !s.rented ? 'no-earn' : 'online';
    return `<div class="clore-card ${cardClass}">
      <div class="clore-card-header"><span style="font-size:14px">${statusIcon}</span>${warnIcon}<span style="margin-left:auto;display:flex;gap:4px">${reliabilityBadge}${remainingBadge}${earningBadge}</span></div>
      <span class="machine-id">${s.name || `Server ${s.id}`}</span>
      ${cpuRamRows}
      ${sysRow ? `<div class="clore-sys-row">${sysRow}</div>` : ''}
      ${gpuBlocks}
      ${netSection}
    </div>`;
  }

  let _cloreServers = [];
  let _cloreTotalEarning = null;
  let _cloreWallets = null;
  let _cloreWalletsFetchedAt = null;
  let _cloreWalletsError = null;
  let _cryptoPrices = null;

  function _rigNum(name) {
    const m = (name || '').replace(/^rig\s*/i, '').trim().match(/^(\d+)/);
    return m ? parseInt(m[1], 10) : null;
  }

  function renderCloreGrid(hiveos, clore, prices) {
    if (hiveos  !== undefined) _cloreWorkers  = hiveos?.workers || [];
    if (prices  !== undefined) _cryptoPrices  = prices;
    if (clore   !== undefined) {
      _cloreServers        = clore?.servers         || [];
      _cloreTotalEarning   = clore?.total_earning   ?? null;
      _cloreWallets        = clore?.wallets         ?? null;
      _cloreWalletsFetchedAt = clore?.wallets_fetched_at ?? null;
      _cloreWalletsError   = clore?.wallets_error   ?? null;
    }

    const wrap  = document.getElementById('clore-grid');
    const view  = document.getElementById('clore-view-select')?.value || 'compact';
    const field = document.getElementById('clore-sort-field')?.value  || 'name';
    const dir   = document.getElementById('clore-sort-dir')?.value    || 'asc';
    localStorage.setItem('cloreSortField', field);
    localStorage.setItem('cloreSortDir',   dir);
    localStorage.setItem('cloreView',      view);

    if (!_cloreServers.length) {
      wrap.innerHTML = '<div style="padding:40px;color:var(--muted)">No Clore servers found.</div>';
      return;
    }

    // index HiveOS workers by rig number for temp data merge
    const hiveByRig = {};
    for (const w of _cloreWorkers) {
      const n = _rigNum(w.name);
      if (n != null) hiveByRig[n] = w;
    }

    // merge clore server + hiveos temps
    const machines = _cloreServers.map(s => ({
      ...s,
      hive: hiveByRig[_rigNum(s.name)] || null,
    }));

    renderCloreBalance(_cloreTotalEarning, _cloreWallets, _cryptoPrices, _cloreWalletsFetchedAt, _cloreWalletsError);
    renderCloreAlerts(machines);
    renderCloreGpuSummary(machines);

    const clTotal  = machines.length;
    const clOnline = machines.filter(s => s.online).length;
    const clEarn   = machines.filter(s => s.rented).length;
    _tabBadges.clore = {
      activeText:  `Active: ${clOnline}/${clTotal}`,
      activeColor: clOnline === clTotal ? 'green' : clOnline === 0 ? 'red' : 'yellow',
      earnText:    `Earning: ${clEarn}/${clTotal}`,
      earnColor:   clEarn === clTotal ? 'green' : clEarn === 0 ? 'red' : 'yellow',
    };
    if (activeTab === 'clore') _applyHeaderBadges(_tabBadges.clore);

    const sorted = [...machines].sort((a, b) => {
      if (field === 'name') { const av = a.name||'', bv = b.name||''; return dir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av); }
      let av, bv;
      if (field === 'gpu_temp')  { av = a.hive?.gpus?.[0]?.temperature_c ?? -1; bv = b.hive?.gpus?.[0]?.temperature_c ?? -1; }
      if (field === 'mem_temp')  { av = a.hive?.gpus?.[0]?.mem_temp_c    ?? -1; bv = b.hive?.gpus?.[0]?.mem_temp_c    ?? -1; }
      if (field === 'gpu_power') { av = a.hive?.total_power_w ?? -1; bv = b.hive?.total_power_w ?? -1; }
      return dir === 'asc' ? av - bv : bv - av;
    });

    wrap.className = '';
    wrap.id = 'clore-grid';
    if (view === 'normal')   wrap.classList.add('view-normal');
    if (view === 'detailed') wrap.classList.add('view-detailed');
    wrap.innerHTML = sorted.map(s => renderCloreServerCard(s, view)).join('');
  }

  function renderBreakerBar(data) {
    const wrap = document.getElementById('breaker-bar');
    if (!data.smart_home_configured) {
      wrap.innerHTML = '';
      wrap.style.display = 'none';
      return;
    }
    const sh = data.smart_home;
    if (!sh || (sh.power_w == null && sh.voltage_v == null && sh.current_a == null)) {
      wrap.innerHTML = '';
      return;
    }
    _updateBreakerCard(sh);
  }

  function _updateBreakerCard(sh) {
    const wrap = document.getElementById('breaker-bar');
    const fmt = (v, dec, unit) => v != null ? `${v.toFixed(dec)}${unit}` : '—';
    wrap.innerHTML = `
      <div class="breaker-card">
        <div class="breaker-header">
          <span class="breaker-title">Breaker</span>
          <button class="breaker-refresh-btn" id="breaker-refresh-btn" onclick="refreshBreaker()" title="Refresh breaker">↻</button>
        </div>
        <div class="breaker-values">
          <div class="breaker-stat">
            <span class="b-label">Power</span>
            <span class="b-value">${fmt(sh.power_w, 0, ' W')}</span>
          </div>
          <div class="breaker-divider"></div>
          <div class="breaker-stat">
            <span class="b-label">Voltage</span>
            <span class="b-value">${fmt(sh.voltage_v, 1, ' V')}</span>
          </div>
          <div class="breaker-divider"></div>
          <div class="breaker-stat">
            <span class="b-label">Current</span>
            <span class="b-value">${fmt(sh.current_a, 2, ' A')}</span>
          </div>
        </div>
      </div>`;
  }

  async function refreshBreaker() {
    const btn = document.getElementById('breaker-refresh-btn');
    if (btn) { btn.disabled = true; btn.style.opacity = '0.4'; }
    try {
      const res = await fetch('/api/smart-home/test');
      if (!res.ok) return;
      const json = await res.json();
      if (json.ok && json.data) _updateBreakerCard(json.data);
    } catch(e) { }
    finally {
      if (btn) { btn.disabled = false; btn.style.opacity = ''; }
    }
  }

  function renderEarningsSummary(data) {
    const wrap = document.getElementById('earnings-summary');
    if (data.earnings_24h == null && data.earnings_30d == null) { wrap.innerHTML = ''; return; }

    // ── Left group: Last 24h | Last 30 days ──
    const leftHtml = `
      <div class="earnings-stat">
        <span class="e-label">Last 24h</span>
        <span class="e-value">$${(data.earnings_24h ?? 0).toFixed(2)}</span>
      </div>
      <div class="earnings-divider"></div>
      <div class="earnings-stat">
        <span class="e-label">Last 30 days</span>
        <span class="e-value">$${(data.earnings_30d ?? 0).toFixed(2)}</span>
      </div>`;

    // ── Right group: Last 1h → Est. 24h ──
    const h1  = data.earnings_1h  ?? 0;
    const est = h1 * 24;
    const rightHtml = `
      <div class="earnings-stat">
        <span class="e-label">Last 1h</span>
        <span class="e-value" style="color:var(--purple)">$${h1.toFixed(2)}</span>
      </div>
      <span class="earnings-arrow">→</span>
      <div class="earnings-stat">
        <span class="e-label">Est. next 24h</span>
        <span class="e-value" style="color:var(--purple)">$${est.toFixed(2)}</span>
      </div>`;

    // ── Balance ──
    const hasCurrent  = data.balance_current  != null;
    const hasLifetime = data.balance_lifetime != null;
    const curVal  = hasCurrent  ? `$${data.balance_current.toFixed(2)}`  : null;
    const lifeVal = hasLifetime ? `$${data.balance_lifetime.toFixed(2)}` : null;
    const balanceHtml = (hasCurrent || hasLifetime) ? `
      <div class="earnings-bar-right">
        ${hasCurrent ? `
        <div class="balance-stat">
          <span class="e-label">Current balance</span>
          <span class="e-value balance-val" data-val="${curVal}">${balanceVisible ? curVal : '••••••'}</span>
        </div>` : ''}
        ${hasCurrent && hasLifetime ? `<div class="earnings-divider"></div>` : ''}
        ${hasLifetime ? `
        <div class="balance-stat">
          <span class="e-label">Lifetime</span>
          <span class="e-value balance-val" data-val="${lifeVal}">${balanceVisible ? lifeVal : '••••••'}</span>
        </div>` : ''}
        <button class="eye-btn" id="balance-eye-btn" onclick="toggleBalance()" title="Show/hide balance">${balanceVisible ? eyeOpenSvg : eyeOffSvg}</button>
      </div>` : '';

    wrap.innerHTML = `
      <div class="earnings-bar">
        <div class="earnings-group">${leftHtml}</div>
        <div class="earnings-divider strong"></div>
        <div class="earnings-group">${rightHtml}</div>
        ${balanceHtml}
        <a class="earnings-details-btn" href="/earnings">Details ↗</a>
      </div>`;
  }

  function renderGpuSummary(machines) {
    const wrap = document.getElementById('gpu-summary');
    const counts = {};
    for (const m of machines) {
      for (const gpu of (m.gpus ?? [])) {
        const match = gpu.name?.match(/\b([2-5]\d{3})(?:\s+(Ti|Super))?/i);
        if (match) {
          const suffix = match[2] ? ` ${match[2].charAt(0).toUpperCase()}${match[2].slice(1).toLowerCase()}` : '';
          const model = match[1] + suffix;
          counts[model] = (counts[model] ?? 0) + 1;
        }
      }
    }
    const entries = Object.entries(counts).sort((a, b) => parseInt(a[0]) - parseInt(b[0]));
    if (!entries.length) { wrap.innerHTML = ''; return; }
    const pills = entries.map(([model, count]) =>
      `<span class="gpu-pill">RTX ${model} × ${count}</span>`
    ).join('');
    let totalWatts = 0, wattsCount = 0;
    for (const m of machines) {
      const gpu = m.gpus && m.gpus.length > 0 ? m.gpus[0] : null;
      if (gpu && gpu.power_w != null) { totalWatts += gpu.power_w; wattsCount++; }
    }
    const powerBox = wattsCount > 0 ? `
      <div class="gpu-box">
        <div class="gpu-box-header">Power</div>
        <span class="gpu-power-value">${Math.round(totalWatts)}W</span>
      </div>` : '';
    const gpusBox = `
      <div class="gpu-box" style="flex:1">
        <div class="gpu-box-header">GPUs</div>
        <div id="gpu-summary-pills">${pills}</div>
      </div>`;
    wrap.innerHTML = `${powerBox}${gpusBox}`;
  }

  function renderAlerts(machines) {
    const alerts = [];

    const offline = machines.filter(m => m.status === 'offline').map(m => m.machine_id);
    if (offline.length) alerts.push({ label: '🔴 Offline', ids: offline, color: 'a-red' });

    const stale = machines.filter(m => m.status === 'stale').map(m => m.machine_id);
    if (stale.length) alerts.push({ label: '🟡 Agent not active', ids: stale, color: 'a-yellow' });

    const saladOff = machines.filter(m =>
      (m.status === 'online' || m.status === 'stale') && m.salad_running === false
    ).map(m => m.machine_id);
    if (saladOff.length) alerts.push({ label: '⚠️ Salad OFF', ids: saladOff, color: 'a-orange' });

const gpuHot = machines.filter(m => {
      const gpu = m.gpus && m.gpus.length > 0 ? m.gpus[0] : null;
      return gpu && gpu.temperature_c >= 80;
    }).map(m => m.machine_id);
    if (gpuHot.length) alerts.push({ label: '🔥 GPU Temp', ids: gpuHot, color: 'a-red' });

    const noEarning = machines.filter(m =>
      m.earning_rate != null && m.earning_rate < 0.001
    ).map(m => m.machine_id);
    if (noEarning.length) alerts.push({ label: '💸 No Earning', ids: noEarning, color: 'a-orange' });

    const outdatedMachines = machines.filter(m =>
      m.salad_version && isOutdated(m.salad_version, latestSaladVersion)
    );
    if (outdatedMachines.length) {
      const noEarningSet = new Set(noEarning);
      alerts.push({
        label: `⬆️ Update to v${latestSaladVersion}`,
        pills: outdatedMachines.map(m => ({
          id: m.machine_id,
          color: noEarningSet.has(m.machine_id) ? 'a-green' : 'a-dim-orange',
        })),
      });
    }

    const wrap = document.getElementById('alerts-wrap');
    if (!alerts.length) { wrap.innerHTML = ''; return; }

    let html = '<div id="alerts">';
    html += '<div id="alerts-header"><span class="dot"></span>Active alerts</div>';
    for (const a of alerts) {
      const pillsHtml = a.pills
        ? a.pills.map(p => `<span class="alert-pill ${p.color}">${p.id}</span>`).join('')
        : a.ids.map(id => `<span class="alert-pill ${a.color}">${id}</span>`).join('');
      const labelColor = a.pills ? 'a-dim-orange' : a.color;
      html += `<div class="alert-row"><span class="alert-label ${labelColor}">${a.label}</span><div class="alert-pills">${pillsHtml}</div></div>`;
    }
    html += '</div>';
    wrap.innerHTML = html;
  }

  let latestSaladVersion = null;
  let latestAgentVersion = null;

  function parseVersion(v) {
    // "1.9.13.20260324.3" or "1.9.13" → compare first 3 parts
    if (!v) return null;
    return v.split('.').slice(0, 3).map(Number);
  }

  function isOutdated(machineVer, latestVer) {
    if (!machineVer || !latestVer) return false;
    const mv = parseVersion(machineVer);
    const lv = parseVersion(latestVer);
    if (!mv || !lv) return false;
    for (let i = 0; i < 3; i++) {
      if ((mv[i] ?? 0) < (lv[i] ?? 0)) return true;
      if ((mv[i] ?? 0) > (lv[i] ?? 0)) return false;
    }
    return false;
  }

  function renderCard(m) {
    const noEarning = m.status === 'online' && m.earning_rate != null && m.earning_rate < 0.001;
    const statusIcon = noEarning ? '🟠' : ({online:'🟢', offline:'🔴', stale:'🟡', never:'⚫'}[m.status] ?? '⚫');
    const saladClass = m.salad_running ? 'on' : 'off';
    const saladText  = m.salad_running ? 'Salad ON' : 'Salad OFF';
    const gpu = m.gpus && m.gpus.length > 0 ? m.gpus[0] : null;
    const isBandwidth = m.mode === 'bandwidth';

    let html = `<div class="card ${m.status}${noEarning ? ' no-earning' : ''}">`;

    // Header
    const gpuTemp = gpu ? gpu.temperature_c : null;
    const hotGpu  = gpuTemp != null && gpuTemp >= 80;
    const fireHtml = hotGpu ? `<span style="font-size:14px">🔥</span>` : '';
    const bwBadge  = isBandwidth ? `<span class="salad-badge on" style="background:rgba(88,164,255,.12);color:#9bc9ff;border-color:rgba(88,164,255,.35)">BW</span>` : '';
    const earnHtml = m.earning_rate != null
      ? `<span class="earning-badge ${m.earning_rate < 0.001 ? 'zero' : ''}">💰 $${m.earning_rate.toFixed(2)}/hr</span>`
      : '';
    html += `
      <div class="card-header">
        <div class="card-header-top">
          <span style="font-size:14px">${statusIcon}</span>
          <div class="card-header-badges">
            ${fireHtml}${earnHtml}
            ${bwBadge}<span class="salad-badge ${saladClass} normal-only">${saladText}</span>
            ${bwBadge}<span class="salad-badge ${saladClass} compact-only">${m.salad_running ? 'ON' : 'OFF'}</span>
            <div class="kebab-wrap">
              <button class="kebab-btn" onclick="toggleKebab(event,this)">⋯</button>
              <div class="kebab-menu">
                <a class="kebab-item" href="/machine?id=${encodeURIComponent(m.machine_id)}">↗ Details</a>
                ${m.command_port ? `<button class="kebab-item" onclick="restartSalad(event,'${m.machine_id}')">↺ Restart Salad</button>` : ''}
${m.command_port ? `<button class="kebab-item danger" onclick="rebootMachine(event,'${m.machine_id}')">⟳ Reboot PC</button>` : ''}
              </div>
            </div>
          </div>
        </div>
        <span class="machine-id">${m.machine_id}</span>
      </div>`;
    if (m.cpu_name) html += `<div class="hostname normal-only">${m.cpu_name}</div>`;
    if (m.ram_total_gb) html += `<div class="hostname normal-only">${Math.round(m.ram_total_gb)}GB RAM</div>`;

    if (m.status === 'never') {
      html += `<div class="never-text normal-only">No data</div>`;
      html += `</div>`;
      return html;
    }

    html += `<hr class="divider normal-only">`;

    // GPU or Bandwidth (full section)
    html += `<div class="normal-only">${isBandwidth ? renderBandwidth(m.bandwidth) : renderGpu(gpu)}</div>`;

    // Network speed row (always shown in detail view when not already in bandwidth section)
    const bwUp = m.bandwidth?.upload_mbps;
    const bwDn = m.bandwidth?.download_mbps;
    const hasBwData = bwUp != null || bwDn != null;

    // Sistema (en detalle)
    html += `<div class="extra" style="flex-direction:column;gap:6px">`;
    html += `<hr class="divider">`;
    html += `<div class="section-label">System</div>`;
    html += barRow('CPU', m.cpu_pct, `${fmt(m.cpu_pct)}%`, barColor);
    const ramStr = m.ram_used_gb != null
      ? `${fmt(m.ram_used_pct)}% · ${fmt(m.ram_used_gb,1)}/${fmt(m.ram_total_gb,1)}GB`
      : `${fmt(m.ram_used_pct)}%`;
    html += barRow('RAM', m.ram_used_pct, ramStr, barColor);
    html += barRow('Disk', m.disk_used_pct, `${fmt(m.disk_used_pct)}%`, barColor);
    if (hasBwData && !isBandwidth) {
      const upStr = `<span style="color:#80bf89">${bwUp != null ? bwUp.toFixed(2) : '—'} Mbps</span> <span class="arr-up">⬆</span>`;
      const dnStr = `<span style="color:#9bc9ff">${bwDn != null ? bwDn.toFixed(2) : '—'} Mbps</span> <span class="arr-dn">⬇</span>`;
      html += `
        <div class="row net-summary-row">
          <span class="label">Network</span>
          <span class="val">${dnStr}&nbsp;&nbsp;&nbsp;${upStr}</span>
        </div>`;
    }
    html += `
      <div class="row">
        <span class="label">Uptime</span>
        <span class="val">${uptimeFmt(m.uptime_hours)}</span>
      </div>`;
    html += `</div>`;

    // Network section — only visible in "Detailed + Network" view
    html += `<div class="net-section">${renderNetwork(m)}</div>`;

    html += `<hr class="divider normal-only">`;
    if (m.salad_version) {
      const outdated = isOutdated(m.salad_version, latestSaladVersion);
      const verDisplay = m.salad_version.split('.').slice(0, 3).join('.');
      const verLabel = `Salad v${verDisplay}${outdated ? ' ⚠️' : ''}`;
      const timeStyle = m.status === 'stale' ? 'color:var(--red)' : '';
      const agentUpdateBtn = m.command_port && latestAgentVersion && latestAgentVersion !== m.agent_version
        ? `<button class="agent-update-btn" onclick="updateAgent(event,'${m.machine_id}')">⬆ Update to ${latestAgentVersion}</button>`
        : '';
      const agentBadge = m.agent_version
        ? `<span class="version-badge">Agent ${m.agent_version}</span>${agentUpdateBtn}`
        : '';
      html += `<div class="card-footer normal-only" style="display:flex;justify-content:space-between;align-items:end">
        <span style="display:flex;flex-direction:column;gap:3px">
          <span class="version-badge${outdated ? ' outdated' : ''}">${verLabel}</span>
          ${agentBadge ? `<span style="display:flex;gap:4px;align-items:center">${agentBadge}</span>` : ''}
        </span>
        <span style="${timeStyle}">${timeAgo(m.last_seen)}</span>
      </div>`;
    } else {
      const timeStyle = m.status === 'stale' ? `style="color:var(--red)"` : '';
      html += `<div class="card-footer normal-only" ${timeStyle}>${timeAgo(m.last_seen)}</div>`;
    }
    if (m.salad_machine_id) {
      html += `<div class="salad-id-row" style="margin-top:2px">
        <span style="color:var(--muted);font-size:10px;font-family:monospace;letter-spacing:.3px">Id: ${m.salad_machine_id}</span>
      </div>`;
    } else {
      html += `<div class="salad-id-row" style="margin-top:2px">
        <span style="color:var(--red);font-size:10px;font-family:monospace;letter-spacing:.3px">⚠ salad_machine_id not configured</span>
      </div>`;
    }
    // ── Compact GPU stats row: L T H M F ──
    if (gpu && !isBandwidth) {
      const clr = { ok: 'var(--green)', warm: 'var(--yellow)', hot: 'var(--orange)', crit: 'var(--red)' };
      const loadCls = gpu.utilization_pct >= 90 ? 'crit' : gpu.utilization_pct >= 75 ? 'hot' : gpu.utilization_pct >= 50 ? 'warm' : 'ok';
      const memTempVal = gpu.memory_junction_c ?? gpu.memory_temperature_c ?? null;
      const items = [
        { key: 'L', label: 'GPU Load',  val: gpu.utilization_pct, unit: '%', color: 'var(--text)' },
        { key: 'T', label: 'GPU Temp',  val: gpu.temperature_c,   unit: '°', color: clr[tempClass(gpu.temperature_c)] },
        { key: 'H', label: 'Hotspot',   val: gpu.hotspot_c,       unit: '°', color: clr[tempClass(gpu.hotspot_c)] },
        { key: 'M', label: 'Mem Temp',  val: memTempVal,          unit: '°', color: clr[tempClass(memTempVal)] },
        { key: 'F', label: 'Fan',       val: gpu.fan_speed_pct,   unit: '%', color: 'var(--muted)' },
      ].filter(i => i.val != null);
      if (items.length) {
        html += `<div class="compact-gpu-stats">${
          items.map(i => `<span class="cgs-item" title="${i.label}: ${i.val}${i.unit}" style="color:${i.color}"><span class="cgs-key">${i.key}</span>${i.val}${i.unit}</span>`).join('')
        }</div>`;
      }
    }

    html += `</div>`;
    return html;
  }

  async function fetchData() {
    clearInterval(timer);
    countdown = 30;

    try {
      const res = await fetch('/api/dashboard');
      if (res.status === 401) throw new Error('401');
      if (!res.ok) throw new Error(res.statusText);
      const data = await res.json();

      latestSaladVersion = data.latest_salad_version || null;
      latestAgentVersion = data.latest_agent_version || null;

      // Cookie banner
      const banner     = document.getElementById('cookie-banner');
      const bannerText = document.getElementById('cookie-banner-text');
      const status     = data.salad_cookie_status;
      if (status === 'not_configured') {
        bannerText.innerHTML = `Salad API cookie is not configured. Run <span class="banner-cmd">update_credentials.bat</span> in the server folder to set it up.`;
        banner.classList.remove('hidden');
      } else if (status === 'expired') {
        bannerText.innerHTML = `Salad API cookie has expired. Run <span class="banner-cmd">update_credentials.bat</span> in the server folder to update it.`;
        banner.classList.remove('hidden');
      } else {
        banner.classList.add('hidden');
      }

      const gearTelegram = document.getElementById('gear-telegram');
      if (gearTelegram) gearTelegram.style.display = data.telegram_configured ? '' : 'none';
      if (data.telegram_configured) applyTelegramVal(data.telegram_enabled);

      if (data.server_version) {
        const vEl = document.getElementById('header-version');
        if (vEl && !vEl.textContent) vEl.textContent = data.server_version;
      }
      const badge = document.getElementById('server-update-badge');
      if (badge && data.server_version_latest) {
        badge.textContent = `New ${data.server_version_latest}`;
        badge.style.display = 'inline';
      }

      lastMachines = data.machines;
      renderAlerts(data.machines);
      renderGpuSummary(data.machines);
      renderEarningsSummary(data);
      renderBreakerBar(data);

      // Show/hide tabs based on Clore config (only apply once)
      if (typeof _cloreConfigured === 'undefined') {
        window._cloreConfigured = data.clore_configured;
        document.getElementById('tabs-bar').style.display = data.clore_configured ? 'flex' : 'none';
        if (!data.clore_configured) {
          document.getElementById('tab-salad').style.display = '';
          document.getElementById('tab-clore').style.display = 'none';
        }
      }

      if (data.clore_configured) {
        renderCloreGrid(data.hiveos, data.clore, data.crypto_prices);
      }
      applySortAndRender();

      const active  = data.active_count;
      const total   = data.total_count;
      const earning = data.machines.filter(m => m.earning_rate != null && m.earning_rate > 0.001).length;
      _tabBadges.salad = {
        activeText:  `Active: ${active}/${total}`,
        activeColor: active === total ? 'green' : active === 0 ? 'red' : 'yellow',
        earnText:    `Earning: ${earning}/${total}`,
        earnColor:   earning === total ? 'green' : earning === 0 ? 'red' : 'yellow',
      };
      if (activeTab === 'salad') _applyHeaderBadges(_tabBadges.salad);

      const t = new Date(data.server_time);
      document.getElementById('last-update').textContent =
        `Updated: ${t.toLocaleTimeString()}`;

    } catch (e) {
      if (e.message === '401') { showAuthOverlay(); return; }
      console.error('Fetch error:', e.message);
    }

    const refreshBtn = document.getElementById('refresh-btn');
    if (autoReload) {
      timer = setInterval(() => {
        countdown--;
        refreshBtn.innerHTML = `↻ Refresh <span style="color:var(--green);font-variant-numeric:tabular-nums">${countdown}s</span>`;
        if (countdown <= 0) fetchData();
      }, 1000);
    } else {
      refreshBtn.innerHTML = '↻ Refresh';
    }
  }

  async function logout() {
    await fetch('/api/logout', { method: 'POST' });
    clearInterval(timer);
    document.getElementById('auth-login').style.display = '';
    document.getElementById('login-password').value = '';
    document.getElementById('login-error').textContent = '';
    showAuthOverlay();
    setTimeout(() => document.getElementById('login-password').focus(), 50);
  }

  // ── Auth ────────────────────────────────────────────────────

  function showAuthOverlay() {
    document.getElementById('auth-overlay').classList.add('visible');
  }

  function hideAuthOverlay() {
    document.getElementById('auth-overlay').classList.remove('visible');
  }

  async function checkAuth() {
    const res = await fetch('/api/auth_status');
    const data = await res.json();
    if (data.setup_required) {
      document.getElementById('auth-setup').style.display = '';
      showAuthOverlay();
    } else if (!data.authenticated) {
      document.getElementById('auth-login').style.display = '';
      showAuthOverlay();
      setTimeout(() => document.getElementById('login-password').focus(), 50);
    } else {
      fetchData();
    }
  }

  async function submitSetup() {
    const pw  = document.getElementById('setup-password').value;
    const pw2 = document.getElementById('setup-confirm').value;
    const err = document.getElementById('setup-error');
    if (pw.length < 6)  { err.textContent = 'Password must be at least 6 characters.'; return; }
    if (pw !== pw2)     { err.textContent = 'Passwords do not match.'; return; }
    err.textContent = '';
    const res = await fetch('/api/setup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    if (res.ok) { hideAuthOverlay(); fetchData(); }
    else { const d = await res.json(); err.textContent = d.error || 'Error.'; }
  }

  async function submitLogin() {
    const pw  = document.getElementById('login-password').value;
    const err = document.getElementById('login-error');
    err.textContent = '';
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    if (res.ok) { hideAuthOverlay(); fetchData(); }
    else { err.textContent = 'Invalid password.'; document.getElementById('login-password').select(); }
  }

  function toggleGear() {
    document.getElementById('gear-dropdown').classList.toggle('open');
  }

  document.addEventListener('click', e => {
    const menu = document.getElementById('gear-menu');
    if (menu && !menu.contains(e.target)) {
      document.getElementById('gear-dropdown').classList.remove('open');
    }
    if (!e.target.closest('.net-info-btn')) {
      document.querySelectorAll('.net-tooltip.visible').forEach(t => t.classList.remove('visible'));
    }
  });

  applyAutoReload();
  applySavedSort();
  applySaladIdBtn();
  checkAuth();

</script>
</body>
</html>
