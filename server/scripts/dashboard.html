<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salad Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --green:     #3fb950;
      --yellow:    #d29922;
      --orange:    #e3742b;
      --red:       #f85149;
      --blue:      #58a6ff;
      --purple:    #bc8cff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", monospace;
      font-size: 13px;
      min-height: 100vh;
    }

    /* ── Auth overlay ── */
    #auth-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #auth-overlay.visible { display: flex; }
    .auth-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 32px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .auth-box h2 { font-size: 18px; font-weight: 600; }
    .auth-box p  { color: var(--muted); font-size: 12px; }
    .auth-box input[type=password] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 8px 12px;
      font-size: 14px;
      outline: none;
    }
    .auth-box input[type=password]:focus { border-color: var(--blue); }
    .auth-box button.primary {
      background: var(--blue);
      color: #000;
      border: none;
      border-radius: 6px;
      padding: 9px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    .auth-box button.primary:hover { opacity: 0.85; }
    .auth-error { color: var(--red); font-size: 12px; min-height: 16px; }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #header-top {
      display: flex;
      align-items: center;
    }
    header h1 { font-size: 16px; font-weight: 600; letter-spacing: .5px; }
    #header-version { font-size: 11px; font-weight: 400; opacity: 0.5; margin-left: 6px; vertical-align: middle; }
    #server-update-badge { display: none; font-size: 9px; font-weight: 500; background: #1b2e28; color: #3fb94a; border: 1px solid #4caf50; border-radius: 10px; padding: 1px 8px; margin-left: 8px; vertical-align: middle; white-space: nowrap; }
    #header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }
    .badge {
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      background: #21262d;
      border: 1px solid var(--border);
    }
    .badge.green  { color: var(--green);  border-color: var(--green); }
    .badge.yellow { color: var(--yellow); border-color: var(--yellow); }
    .badge.red    { color: var(--red);    border-color: var(--red); }
    #last-update  { color: var(--muted); font-size: 12px; }
    #header-bottom { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    #badges-row, #status-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    button#refresh-btn {
      background: #21262d;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: background .15s, color .15s, border-color .15s;
    }
    button#refresh-btn:hover { background: #30363d; }

    /* ── Gear dropdown ── */
    #gear-menu { position: relative; }
    #gear-btn {
      background: #21262d;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      transition: background .15s;
    }
    #gear-btn:hover { background: #30363d; }
    #gear-dropdown {
      display: none;
      position: absolute;
      right: 0;
      top: calc(100% + 6px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      min-width: 210px;
      z-index: 100;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
    }
    #gear-dropdown.open { display: block; }
    .gear-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text);
      transition: background .1s;
      gap: 12px;
    }
    .gear-item:hover { background: #21262d; }
    .gear-item.danger { color: var(--red); }
    .gear-item .gear-label { flex: 1; }
    .gear-item .gear-val { color: var(--muted); font-size: 11px; }
    .gear-item .gear-val.on { color: var(--green); }
    .gear-divider { border: none; border-top: 1px solid var(--border); margin: 0; }

    /* ── GPU summary ── */
    #gpu-summary {
      padding: 12px 20px 0;
      display: flex;
      gap: 12px;
    }
    .gpu-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .gpu-box-header {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .gpu-power-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--blue);
      font-family: monospace;
      font-variant-numeric: tabular-nums;
    }
    #gpu-summary-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .gpu-pill {
      background: rgba(88,166,255,.1);
      border: 1px solid rgba(88,166,255,.3);
      color: var(--blue);
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      font-family: monospace;
    }

    /* ── View + Sort controls ── */
    #sort-bar {
      padding: 0 20px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-top: 12px;
    }
    .bar-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .bar-group label {
      font-size: 11px;
      color: var(--muted);
      display: block;
    }
    #view-bar select, #sort-bar select {
      background: #21262d;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      outline: none;
      transition: border-color .15s;
    }
    #view-bar select:hover, #sort-bar select:hover { border-color: #8b949e; }
    #sort-bar button {
      background: #21262d;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: background .15s, color .15s, border-color .15s;
      margin-left: auto;
    }
    #sort-bar button:hover { background: #30363d; color: var(--text); }
    #sort-bar button.on { color: var(--blue); border-color: rgba(88,166,255,.5); }
    body.hide-salad-id .salad-id-row { display: none !important; }

    /* ── Grid ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
      padding: 16px 20px;
    }
    #grid.view-compact { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }

    /* ── View levels ── */
    .extra { display: none; flex-direction: column; gap: 6px; }
    #grid.view-detailed .extra,
    #grid.view-detailed-net .extra     { display: flex; }
    #grid.view-detailed-net .net-section { display: flex; }
    #grid.view-detailed-net .net-summary-row { display: none; }
    .net-section { display: none; flex-direction: column; gap: 6px; }
    .arr-up { color: var(--green); }
    .arr-dn { color: #58a6ff; }
    .net-info-btn {
      cursor: pointer; user-select: none;
      color: var(--yellow); font-size: 10px;
      opacity: .8; white-space: nowrap; flex-shrink: 0;
    }
    .net-info-btn:hover { opacity: 1; text-decoration: underline; }
    .net-tooltip {
      display: none; position: absolute; right: 0; top: 20px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 10px;
      font-size: 11px; color: var(--muted); line-height: 1.5;
      width: 220px; z-index: 100; box-shadow: 0 4px 12px rgba(0,0,0,.5);
    }
    .net-tooltip.visible { display: block; }
    .net-tooltip-warn { color: var(--yellow); font-weight: bold; margin-bottom: 6px; display: block; }
    #grid.view-compact .normal-only { display: none !important; }
    #grid.view-compact .card { padding: 10px 12px; gap: 6px; }
    .compact-only { display: none; }
    #grid.view-compact .compact-only { display: inline; }
    .compact-gpu-stats { display: none; gap: 6px; flex-wrap: wrap; margin-top: 6px; font-size: 11px; font-variant-numeric: tabular-nums; }
    #grid.view-compact .compact-gpu-stats { display: flex; }
    .cgs-item { cursor: default; white-space: nowrap; }
    .cgs-key  { font-weight: 700; margin-right: 2px; opacity: 0.55; font-size: 10px; }

    /* ── View toggle button group ── */
    .view-btns {
      display: flex;
      width: fit-content;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .view-btn {
      background: #21262d;
      border: none;
      border-right: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 11px;
      cursor: pointer;
      font-size: 12px;
      transition: background .15s, color .15s;
    }
    .view-btn:last-child { border-right: none; }
    .view-btn.active { background: #388bfd22; color: var(--blue); font-weight: 600; }
    .view-btn:hover:not(.active) { background: #262c33; color: var(--text); }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color .2s;
    }
    .card.online             { border-left: 3px solid var(--green); }
    .card.online.no-earning  { border-left: 3px solid var(--orange); }
    .card.offline { border-left: 3px solid var(--red);   opacity: .85; }
    .card.stale   { border-left: 3px solid var(--yellow); opacity: .55; }
    .card.never   { border-left: 3px solid var(--border); opacity: .5; }

    .card-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }
    .card-header-top {
      display: flex;
      align-items: center;
      gap: 4px;
      width: 100%;
      justify-content: space-between;
    }
    .card-header-badges {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .machine-id {
      font-size: 15px;
      font-weight: 700;
      font-family: monospace;
      letter-spacing: .5px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-all;
      width: 100%;
    }
    .salad-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .salad-badge.on  { background: rgba(63,185,80,.15); color: var(--green); }
    .salad-badge.off { background: rgba(248,81,73,.15);  color: var(--red); }

    .hostname { color: var(--muted); font-size: 11px; margin-top: -6px; }

    .earning-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(63,185,80,.12);
      color: var(--green);
      border: 1px solid rgba(63,185,80,.3);
      font-variant-numeric: tabular-nums;
      width: max-content;
    }
    .earning-badge.dim  { background: rgba(139,148,158,.08); color: var(--muted); border-color: var(--border); font-weight: 400; }
    .earning-badge.zero { background: rgba(227,116,43,.12); color: var(--orange); border-color: rgba(227,116,43,.4); }

    /* ── Sections ── */
    .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    /* ── Rows ── */
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .row .label { color: var(--muted); min-width: 46px; }
    .row .val   { font-weight: 600; text-align: right; font-variant-numeric: tabular-nums; }

    .ok     { color: var(--text); }
    .warm   { color: var(--yellow); }
    .hot    { color: var(--orange); }
    .crit   { color: var(--red); }
    .good   { color: var(--green); }
    .info   { color: var(--blue); }

    /* ── Progress bar ── */
    .bar-wrap {
      flex: 1;
      height: 5px;
      background: #21262d;
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--blue);
      transition: width .4s ease;
    }
    .bar-fill.green   { background: var(--green); }
    .bar-fill.yellow  { background: var(--yellow); }
    .bar-fill.orange  { background: var(--orange); }
    .bar-fill.red     { background: var(--red); }
    .bar-fill.neutral { background: #4a5568; }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0;
    }

    /* ── Tags ── */
    .tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag  {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      background: #21262d;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .tag.warn { color: var(--yellow); border-color: var(--yellow); background: rgba(210,153,34,.1); }
    .tag.crit { color: var(--red);    border-color: var(--red);    background: rgba(248,81,73,.1); }

    /* ── Footer ── */
    .card-footer { color: var(--muted); font-size: 11px; text-align: right; }

    /* ── Never / Stale overlay text ── */
    .never-text { color: var(--muted); font-size: 13px; text-align: center; padding: 10px 0; }

    /* ── Loading ── */
    #loading {
      text-align: center;
      padding: 60px;
      color: var(--muted);
      font-size: 15px;
    }

    /* ── Tabs ── */
    #tabs-bar {
      display: none;
      gap: 4px;
      padding: 12px 20px 0;
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      padding: 8px 20px;
      cursor: pointer;
      border-bottom: none;
      transition: color .15s, background .15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      background: var(--surface);
      color: var(--text);
      border-color: var(--border);
    }
    #tab-salad, #tab-clore {
      border-top: 1px solid var(--border);
    }
    .tab-icon { vertical-align: middle; margin-right: 6px; }

    /* ── Clore sort bar — matches #sort-bar styles ── */
    #clore-sort-bar {
      padding: 0 20px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-top: 12px;
    }
    #clore-sort-bar select {
      background: #21262d;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      outline: none;
      transition: border-color .15s;
    }
    #clore-sort-bar select:hover { border-color: #8b949e; }

    /* ── Clore Grid ── */
    #clore-alerts-wrap { padding: 0 20px; }
    #clore-gpu-summary { padding: 12px 20px 0; display: flex; gap: 12px; }
    #clore-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      padding: 16px 20px;
    }
    #clore-grid.view-normal   { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    #clore-grid.view-detailed { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }

    .clore-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      cursor: default;
    }
    .clore-card.online  { border-left: 3px solid var(--green); }
    .clore-card.no-earn { border-left: 3px solid var(--orange); }
    .clore-card.offline { border-left: 3px solid var(--red); opacity: .55; }
    .clore-card-header {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .clore-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .clore-status-dot.online  { background: var(--green); }
    .clore-status-dot.offline { background: var(--red); }
    .clore-status-dot.no-earn { background: var(--yellow); }
    .clore-worker-name {
      font-weight: 700;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .clore-sys-row {
      display: flex;
      gap: 12px;
      font-size: 11px;
      color: var(--muted);
      flex-wrap: wrap;
    }
    .clore-sys-row span { white-space: nowrap; }
    .clore-gpu-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-top: 1px solid var(--border);
      padding-top: 6px;
    }
    .clore-gpu-name {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .clore-cgs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
    }
    .clore-cgs-item {
      cursor: default;
      white-space: nowrap;
    }
    .clore-cgs-key {
      font-weight: 700;
      margin-right: 2px;
      opacity: 0.55;
      font-size: 10px;
    }
    .clore-detail-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 12px;
      font-size: 11px;
      margin-top: 2px;
    }
    .clore-detail-row span { color: var(--muted); }
    .clore-detail-row b { color: var(--text); font-weight: 600; }

    /* ── Breaker Bar ── */
    #breaker-bar {
      padding: 8px 20px 0;
    }
    .breaker-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .breaker-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .breaker-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }
    .breaker-values {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .breaker-stat {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .breaker-stat .b-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }
    .breaker-stat .b-value {
      font-size: 18px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      font-family: monospace;
      color: var(--orange);
    }
    .breaker-divider {
      width: 1px;
      height: 32px;
      background: var(--border);
      margin: 0 4px;
    }
    .breaker-refresh-btn {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 14px;
      padding: 4px 8px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .breaker-refresh-btn:hover { color: var(--text); border-color: var(--text); }

    /* ── Earnings Summary ── */
    #earnings-summary {
      padding: 12px 20px 0;
    }
    .earnings-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      padding-right: 120px;
      display: flex;
      gap: 24px;
      align-items: flex-start;
      flex-wrap: wrap;
      position: relative;
    }
    .earnings-stat {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .earnings-stat .e-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }
    .earnings-stat .e-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--green);
      font-variant-numeric: tabular-nums;
      font-family: monospace;
    }
    .earnings-divider {
      width: 1px;
      height: 32px;
      background: var(--border);
    }
    .earnings-divider.strong {
      width: 2px;
      height: 40px;
      background: #444c56;
      border-radius: 1px;
    }
    .earnings-arrow {
      color: var(--muted);
      font-size: 14px;
      align-self: center;
      padding-bottom: 2px;
    }
    .earnings-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .earnings-bar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    @media (max-width: 600px) {
      .earnings-bar { flex-direction: column; gap: 10px; }
      .earnings-bar > .earnings-divider.strong { display: none; }
      .earnings-bar.nowrap { flex-direction: row; gap: 16px; overflow-x: auto; }
    }
    @media (max-width: 580px) {
      .clore-wallet-group .earnings-divider { display: none; }
    }
    .balance-stat {
      display: flex;
      flex-direction: column;
      gap: 1px;
      align-items: flex-end;
    }
    .balance-stat .e-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
    .balance-stat .e-value { font-size: 18px; font-weight: 700; color: var(--blue); font-variant-numeric: tabular-nums; font-family: monospace; }
    .eye-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 16px;
      padding: 4px;
      line-height: 1;
      transition: color .15s;
    }
    .eye-btn:hover { color: var(--text); }

    /* ── Cookie warning banner ── */
    #cookie-banner {
      display: none;
      margin: 12px 20px 0;
      background: rgba(248,81,73,.08);
      border: 1px solid rgba(248,81,73,.4);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--red);
    }
    #cookie-banner.hidden { display: none !important; }
    #cookie-banner .banner-icon { font-size: 18px; flex-shrink: 0; }
    #cookie-banner .banner-text { flex: 1; }
    #cookie-banner .banner-cmd {
      font-family: monospace;
      background: rgba(248,81,73,.12);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    /* ── Alert Summary ── */
    #alerts-wrap {
      padding: 12px 20px 0;
    }
    #alerts {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #alerts-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    #alerts-header .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); display: inline-block; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .alert-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .alert-label {
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      min-width: 120px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .alert-label.a-red       { color: var(--red); }
    .alert-label.a-orange    { color: var(--orange); }
    .alert-label.a-yellow    { color: var(--yellow); }
    .alert-label.a-dim-orange { color: #a0622a; }
    .alert-pills { display: flex; flex-wrap: wrap; gap: 4px; }
    .alert-pill {
      font-size: 11px;
      font-family: monospace;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .alert-pill.a-red        { background: rgba(248,81,73,.12);  color: var(--red);    border: 1px solid rgba(248,81,73,.35); }
    .alert-pill.a-orange     { background: rgba(227,116,43,.12); color: var(--orange); border: 1px solid rgba(227,116,43,.35); }
    .alert-pill.a-yellow     { background: rgba(210,153,34,.12); color: var(--yellow); border: 1px solid rgba(210,153,34,.35); }
    .alert-pill.a-green      { background: rgba(63,185,80,.15);  color: var(--green);  border: 1px solid rgba(63,185,80,.4); }
    .alert-pill.a-dim-orange { background: rgba(227,116,43,.07); color: #a0622a;       border: 1px solid rgba(227,116,43,.2); }

    /* ── Stats button ── */
    .stats-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      width: 100%;
      background: #21262d;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      transition: background .15s, color .15s, border-color .15s;
      margin-top: 4px;
      text-decoration: none;
    }
    .stats-btn:hover { background: #30363d; color: var(--blue); border-color: rgba(88,166,255,.4); }
    .compact-detail-btn { display: none; }
    #grid.view-compact .stats-btn { display: none; }

    .kebab-wrap { position: relative; }
    .kebab-btn {
      background: transparent; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 16px; line-height: 1; padding: 2px 6px;
      border-radius: 5px; transition: background .15s, color .15s;
    }
    .kebab-btn:hover { background: #30363d; color: var(--text); }
    .kebab-menu {
      display: none; position: absolute; right: 0; top: calc(100% + 4px);
      background: #1c2128; border: 1px solid #30363d;
      border-radius: 8px; min-width: 160px; z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,.4); overflow: hidden;
    }
    .kebab-menu.open { display: block; }
    .kebab-item {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 14px; font-size: 13px; cursor: pointer;
      color: var(--text); text-decoration: none;
      transition: background .12s;
      border: none; background: none; width: 100%; text-align: left;
    }
    .kebab-item:hover { background: #30363d; }
    .kebab-item.danger { color: var(--red); }
    .kebab-item.danger:hover { background: rgba(248,81,73,.12); }

    .earnings-details-btn {
      position: absolute;
      top: 10px;
      right: 12px;
      padding: 6px 12px;
      margin-left: 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #58a6ff;
      background: rgba(88,166,255,.08);
      border: 1px solid rgba(88,166,255,.25);
      border-radius: 6px;
      text-decoration: none;
      white-space: nowrap;
      transition: color .15s, border-color .15s, background .15s;
    }
    .earnings-details-btn:hover { color: #79bfff; background: rgba(88,166,255,.15); border-color: rgba(88,166,255,.5); }

    /* ── Version badge ── */
    .version-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      background: rgba(63,185,80,.1);
      color: var(--green);
      border: 1px solid rgba(63,185,80,.3);
      font-family: monospace;
      width: fit-content;
    }
    .server-new-badge { font-size: 9px; font-weight: 500; border-radius: 10px; padding: 1px 8px; vertical-align: middle; white-space: nowrap; }
    .agent-update-btn { font-size: 10px; font-weight: 600; background: #21262d; color: #cdd9e5; border: 1px solid #444c56; border-radius: 4px; padding: 2px 8px; cursor: pointer; white-space: nowrap; font-family: monospace; transition: background .15s, border-color .15s; }
    .agent-update-btn:hover { background: #2d333b; border-color: #768390; }
    .version-badge.outdated {
      color: var(--orange);
      border-color: rgba(227,116,43,.4);
      background: rgba(227,116,43,.1);
    }
    .reboot-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 5px;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
    }
    .reboot-btn:hover { background: rgba(248,81,73,.12); color: var(--red); border-color: rgba(248,81,73,.4); }
    .reboot-btn.loading { opacity: .5; pointer-events: none; }
  </style>
</head>
<body>

<!-- Reboot confirmation modal -->
<div id="reboot-modal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.6);backdrop-filter:blur(2px);align-items:center;justify-content:center">
  <div style="background:#161b22;border:1px solid #30363d;border-radius:12px;padding:28px 32px;max-width:340px;width:90%;box-shadow:0 16px 48px rgba(0,0,0,.5)">
    <div id="reboot-modal-icon" style="font-size:22px;margin-bottom:8px">⟳</div>
    <div id="reboot-modal-title" style="font-weight:700;font-size:15px;margin-bottom:6px">Restart machine?</div>
    <div id="reboot-modal-name" style="color:var(--muted);font-size:13px;margin-bottom:20px;font-family:monospace"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button onclick="document.getElementById('reboot-modal').style.display='none'" style="background:#21262d;border:1px solid #30363d;color:var(--text);padding:7px 18px;border-radius:7px;cursor:pointer;font-size:13px">Cancel</button>
      <button id="reboot-modal-confirm" style="background:rgba(248,81,73,.15);border:1px solid rgba(248,81,73,.4);color:#f85149;padding:7px 18px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600">Restart</button>
    </div>
  </div>
</div>

<!-- Auth overlay (setup + login) -->
<div id="auth-overlay">
  <!-- Setup screen -->
  <div id="auth-setup" class="auth-box" style="display:none">
    <h2>⚡ Salad Monitor</h2>
    <p>Set up a password to protect the dashboard.</p>
    <input type="password" id="setup-password" placeholder="Password (min. 6 characters)" />
    <input type="password" id="setup-confirm" placeholder="Confirm password" />
    <div class="auth-error" id="setup-error"></div>
    <button class="primary" onclick="submitSetup()">Set password</button>
  </div>
  <!-- Login screen -->
  <div id="auth-login" class="auth-box" style="display:none">
    <h2>⚡ Salad Monitor</h2>
    <p>Enter your password to continue.</p>
    <input type="password" id="login-password" placeholder="Password" onkeydown="if(event.key==='Enter')submitLogin()" />
    <div class="auth-error" id="login-error"></div>
    <button class="primary" onclick="submitLogin()">Log in</button>
  </div>
</div>

<header>
  <div id="header-top">
    <h1><img id="header-icon" style="width:20px;height:20px;vertical-align:middle;margin-right:6px;image-rendering:auto"><span id="header-title-text">Salad Monitor</span><span id="header-version"></span><span id="server-update-badge"></span></h1>
    <div id="header-actions">
      <button id="refresh-btn" onclick="fetchData()">↻ Refresh</button>
      <div id="gear-menu">
        <button id="gear-btn" onclick="toggleGear()">⚙</button>
        <div id="gear-dropdown">
          <div class="gear-item" id="gear-telegram" onclick="toggleTelegram()" style="display:none">
            <span class="gear-label">Telegram notifications</span>
            <span class="gear-val" id="gear-telegram-val">—</span>
          </div>
          <div class="gear-item" onclick="toggleAutoReload()">
            <span class="gear-label">Auto refresh</span>
            <span class="gear-val" id="gear-autoreload-val">ON</span>
          </div>
          <div class="gear-item" onclick="toggleSaladId()">
            <span class="gear-label">Salad ID</span>
            <span class="gear-val" id="gear-saladid-val">Show</span>
          </div>
          <hr class="gear-divider">
          <div class="gear-item danger" onclick="logout()">
            <span class="gear-label">⏻ Logout</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="header-bottom">
    <div id="badges-row">
      <span id="active-badge" class="badge">—</span>
      <span id="earning-badge" class="badge">—</span>
    </div>
    <span id="last-update" style="margin-left:auto">—</span>
  </div>
</header>

<div id="cookie-banner" class="hidden">
  <span class="banner-icon">⚠️</span>
  <span class="banner-text" id="cookie-banner-text"></span>
</div>
<div id="breaker-bar"></div>
<div id="tabs-bar">
  <button class="tab-btn active" id="tab-btn-salad" onclick="switchTab('salad')">

<script>
  let countdown    = 30;
  let timer;
  let autoReload   = localStorage.getItem('autoReload') !== 'false';
  let lastMachines = [];

  function _showCommandModal(title, subtitle, endpoint, btn, resetLabel, confirmLabel = 'Restart', icon = '⟳', countdown = 0) {
    const modal = document.getElementById('reboot-modal');
    const iconEl = document.getElementById('reboot-modal-icon');
    iconEl.textContent = icon;
    iconEl.style.display = icon ? '' : 'none';
    document.getElementById('reboot-modal-title').textContent = title;
    document.getElementById('reboot-modal-name').textContent = subtitle;
    modal.style.display = 'flex';

    const confirmBtn = document.getElementById('reboot-modal-confirm');
    const newConfirm = confirmBtn.cloneNode(true);
    newConfirm.textContent = confirmLabel;
    confirmBtn.replaceWith(newConfirm);

    newConfirm.onclick = async () => {
      modal.style.display = 'none';
      btn.classList.add('loading');
      btn.textContent = '…';
      try {
        const r = await fetch(endpoint, { method: 'POST' });
        const j = await r.json().catch(() => ({}));
        if (r.ok) {
          if (countdown > 0) {
            let secs = countdown;
            btn.disabled = true;
            btn.style.color = 'var(--green)';
            const tick = () => {
              btn.textContent = `↻ refreshing in ${secs}s`;
              if (secs <= 0) { fetchData(); btn.textContent = resetLabel; btn.style.color = ''; btn.disabled = false; return; }
              secs--;
              setTimeout(tick, 1000);
            };
            tick();
          } else {
            btn.textContent = '✓ sent';
            btn.style.color = 'var(--green)';
            setTimeout(() => { btn.textContent = resetLabel; btn.style.color = ''; }, 4000);
          }
        } else {
          btn.textContent = '✗ error';
          btn.style.color = 'var(--red)';
          alert(`Failed: ${j.error || r.status}`);
          setTimeout(() => { btn.textContent = resetLabel; btn.style.color = ''; }, 4000);
        }
      } catch (e) {
        btn.textContent = '✗';
        btn.style.color = 'var(--red)';
        alert(`Failed: ${e.message}`);
        setTimeout(() => { btn.textContent = resetLabel; btn.style.color = ''; }, 4000);
      } finally {
        btn.classList.remove('loading');
      }
    };
  }

  function toggleKebab(evt, btn) {
    evt.stopPropagation();
    const menu = btn.nextElementSibling;
    const isOpen = menu.classList.contains('open');
    document.querySelectorAll('.kebab-menu.open').forEach(m => m.classList.remove('open'));
    if (!isOpen) menu.classList.add('open');
  }
  document.addEventListener('click', () => {
    document.querySelectorAll('.kebab-menu.open').forEach(m => m.classList.remove('open'));
  });

  function rebootMachine(evt, machineId) {
    _showCommandModal(
      `Reboot ${machineId}?`, '',
      `/api/machines/${encodeURIComponent(machineId)}/reboot`,
      evt.currentTarget, '⟳ Reboot PC', 'Reboot', '');
  }

  function restartSalad(evt, machineId) {
    _showCommandModal(
      `Restart Salad on ${machineId}?`, '',
      `/api/machines/${encodeURIComponent(machineId)}/restart-salad`,
      evt.currentTarget, '↺ Restart Salad', 'Restart', '');
  }

  function updateAgent(evt, machineId) {
    const ver = latestAgentVersion || '';
    _showCommandModal(
      `Update ${machineId} Agent${ver ? ` to ${ver}` : ''}?`,
      '',

  function sortMachines(machines) {
    const field = document.getElementById('sort-field').value;
    const dir   = document.getElementById('sort-dir').value;
    const mult  = dir === 'asc' ? 1 : -1;

    const val = m => {
      if (field === 'name')      return m.machine_id ?? '';
      if (field === 'earning')   return m.earning_rate ?? -1;
      if (field === 'gpu_temp')     return (m.gpus?.[0]?.temperature_c) ?? -1;
      if (field === 'gpu_mem_temp') return (m.gpus?.[0]?.memory_junction_c ?? m.gpus?.[0]?.memory_temperature_c) ?? -1;
      if (field === 'gpu_power')    return (m.gpus?.[0]?.power_w) ?? -1;
      return 0;
    };

    return [...machines].sort((a, b) => {
      const av = val(a), bv = val(b);
      if (typeof av === 'string') return mult * av.localeCompare(bv);
      return mult * (av - bv);
    });
  }

  function fmt(v, decimals=0) {
    if (v == null) return '—';
    return decimals > 0 ? Number(v).toFixed(decimals) : Math.round(v);
  }

  function tempClass(t) {
    if (t == null) return 'ok';
    if (t >= 85) return 'crit';
    if (t >= 80) return 'hot';
    if (t >= 70) return 'warm';
    return 'ok';
  }

  function barColor(pct) {
    if (pct >= 95) return 'red';
    if (pct >= 80) return 'orange';
    if (pct >= 60) return 'yellow';
    return 'green';
  }

  function powerClass(power, limit, throttles) {
    if (throttles && throttles.includes('power_cap')) return 'warm';
    if (power && limit && power / limit >= 0.98) return 'crit';
    return 'ok';
  }

  function timeAgo(isoStr) {
    if (!isoStr) return '—';
    const diff = Math.floor((Date.now() - new Date(isoStr)) / 1000);
    if (diff < 60)  return `${diff}s ago`;
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    return `${Math.floor(diff/3600)}h ago`;
  }

  function uptimeFmt(h) {
    if (h == null) return '—';
    const d = Math.floor(h / 24), rem = Math.round(h % 24);
    return d > 0 ? `${d}d ${rem}h` : `${Math.round(h)}h`;
  }

  function barRow(label, pct, valStr, colorFn) {
    const color = typeof colorFn === 'function' ? colorFn(pct) : colorFn;
    const w = Math.min(100, Math.max(0, pct || 0));
    return `
      <div class="row">
        <span class="label">${label}</span>
        <div class="bar-wrap"><div class="bar-fill ${color}" style="width:${w}%"></div></div>
        <span class="val ${color === 'red' ? 'crit' : color === 'orange' ? 'hot' : color === 'yellow' ? 'warm' : 'ok'}">${valStr}</span>
      </div>`;
  }

  function fmtMB(v) {
    if (v == null) return '—';
    if (v >= 1024) return `${(v / 1024).toFixed(2)} GB`;
    return `${v.toFixed(1)} MB`;
  }

  function renderNetwork(m) {
    const bw     = m.bandwidth || {};
    const totals = m.bandwidth_totals || {};
    const fmtMbps = v => v != null ? `${v.toFixed(2)} Mbps` : '—';

    const up = `<span class="arr-up">⬆</span>`;
    const dn = `<span class="arr-dn">⬇</span>`;

    let html = `<hr class="divider"><div class="section-label">Network</div>`;
    html += `
      <div class="row">
        <span class="label">Download</span>
        <span class="val" style="color:#9bc9ff">${fmtMbps(bw.download_mbps)} ${dn}</span>
      </div>
      <div class="row">
        <span class="label">Upload</span>
        <span class="val" style="color:#80bf89">${fmtMbps(bw.upload_mbps)} ${up}</span>
      </div>`;

    const fmtMBFixed = v => {
      if (v == null) return '—';
      if (v >= 1024) return `${(v / 1024).toFixed(2)} GB`;
      return `${v.toFixed(2)} MB`;
    };

    const periods = [
      { key: '15m', label: 'Last 15m' },
      { key: '1h',  label: 'Last 1h'  },
      { key: '24h', label: 'Last 24h' },
    ];
    html += `<div style="display:grid;grid-template-columns:auto auto 1fr auto 1fr auto;gap:3px 5px;align-items:center;font-variant-numeric:tabular-nums;font-family:monospace;font-size:11px">`;
    for (const p of periods) {
      const t = totals[p.key] || {};
      html += `
        <span class="label" style="font-family:inherit">${p.label}</span>
        <span style="color:var(--muted)">≈</span>
        <span style="color:#9bc9ff;text-align:right">${fmtMBFixed(t.downloaded_mb)}</span>
        <span>${dn}</span>
        <span style="color:#80bf89;text-align:right">${fmtMBFixed(t.uploaded_mb)}</span>
        <span>${up}</span>`;
    }
    html += `</div>`;
    html += `
      <div style="display:flex;justify-content:space-between;align-items:center;gap:6px;margin-top:2px">
        <span style="color:var(--orange);font-size:10px">Values are approximate and may differ from reality.</span>
        <div style="position:relative;flex-shrink:0">
          <span class="net-info-btn" onclick="this.nextElementSibling.classList.toggle('visible')">+ info</span>
          <div class="net-tooltip">
            <span class="net-tooltip-warn">⚠ Values are approximate and may differ from reality.</span>
            Speeds are measured by comparing network adapter counters between reports (~60s intervals).<br><br>
            Totals include <b>all</b> traffic on the active adapter, not just Salad.
          </div>
        </div>
      </div>`;
    return html;
  }

  function renderGpu(g) {
    if (!g) return '<div class="never-text">No GPU data</div>';

    const tc  = tempClass(g.temperature_c);
    const pc  = powerClass(g.power_w, g.power_limit_w, g.throttle_reasons);
    const pct = g.memory_total_mb ? Math.round(g.memory_used_mb / g.memory_total_mb * 100) : null;

    const powerStr = g.power_w != null
      ? (g.power_limit_w != null ? `${g.power_w}/${g.power_limit_w}W` : `${g.power_w}W`)
      : '—';

    const clockStr = g.clock_sm_mhz != null
      ? `${g.clock_sm_mhz}/${g.clock_sm_max_mhz ?? '?'}MHz`
      : '—';

    const perf = g.perf_state != null ? `P${g.perf_state}` : '—';

    const tempBarColor = tc === 'crit' ? 'red' : tc === 'hot' ? 'orange' : tc === 'warm' ? 'yellow' : 'green';
    const hc  = tempClass(g.hotspot_c);
    const hotBarColor  = hc  === 'crit' ? 'red' : hc  === 'hot' ? 'orange' : hc  === 'warm' ? 'yellow' : 'green';
    const memTempVal   = g.memory_junction_c ?? g.memory_temperature_c ?? null;
    const mc  = tempClass(memTempVal);
    const memTempBarColor = mc === 'crit' ? 'red' : mc === 'hot' ? 'orange' : mc === 'warm' ? 'yellow' : 'green';

    let html = `<div class="section-label">GPU · ${g.name ?? '—'}</div>`;

    // ── Basic: Temp, Hotspot, Mem Temp, Load, Fan ──
    html += `
      <div class="row">
        <span class="label" style="min-width:58px">GPU Temp</span>
        <div class="bar-wrap"><div class="bar-fill ${tempBarColor}" style="width:${Math.min(100,(g.temperature_c??0)/110*100)}%"></div></div>
        <span class="val ${tc}">${g.temperature_c != null ? g.temperature_c+'°C' : '—'}</span>
      </div>`;
    if (g.hotspot_c != null) html += `
      <div class="row">
        <span class="label" style="min-width:58px">Hotspot</span>
        <div class="bar-wrap"><div class="bar-fill ${hotBarColor}" style="width:${Math.min(100,(g.hotspot_c??0)/110*100)}%"></div></div>
        <span class="val ${hc}">${g.hotspot_c}°C</span>
      </div>`;
    if (memTempVal != null) html += `
      <div class="row">
        <span class="label" style="min-width:58px">Mem Temp</span>
        <div class="bar-wrap"><div class="bar-fill ${memTempBarColor}" style="width:${Math.min(100,(memTempVal??0)/110*100)}%"></div></div>
        <span class="val ${mc}">${memTempVal}°C</span>
      </div>`;
    html += barRow('Load', g.utilization_pct, `${fmt(g.utilization_pct)}%`, 'neutral');
    html += `
      <div class="row">
        <span class="label">Fan</span>
        <div class="bar-wrap"><div class="bar-fill neutral" style="width:${Math.min(100, g.fan_speed_pct ?? 0)}%"></div></div>
        <span class="val">${g.fan_speed_pct != null ? g.fan_speed_pct+'%' : '—'}</span>
      </div>`;

    // ── Detalle: VRAM, Watts, throttle ──
    html += `<div class="extra" style="flex-direction:column;gap:6px;margin-top:4px">`;
    html += barRow('VRAM', pct, `${fmt(pct)}% · ${fmt(g.memory_used_mb)}/${fmt(g.memory_total_mb)}MB`, barColor);
    html += `
      <div class="row">
        <span class="label">Watts</span>
        <span class="val ${pc}" style="flex:1;text-align:right">${powerStr}</span>
      </div>`;
    html += `</div>`;

    return html;
  }

    const wrap = document.getElementById('clore-alerts-wrap');
    const alerts = [];
    const offline = machines.filter(s => !s.online).map(s => s.name || `#${s.id}`);
    if (offline.length) alerts.push({ label: '🔴 Offline', ids: offline, color: 'a-red' });
    const hot = machines.filter(s => (s.hive?.gpus || []).some(g => g.temperature_c >= 80)).map(s => s.name || `#${s.id}`);
    if (hot.length) alerts.push({ label: '🔥 GPU Temp', ids: hot, color: 'a-red' });
    const memHot = machines.filter(s => (s.hive?.gpus || []).some(g => g.mem_temp_c >= 90)).map(s => s.name || `#${s.id}`);
    if (memHot.length) alerts.push({ label: '🔥 Mem Temp', ids: memHot, color: 'a-orange' });
    const noEarn = machines.filter(s => s.online && !s.rented).map(s => s.name || `#${s.id}`);
    if (noEarn.length) alerts.push({ label: '💸 No Earning', ids: noEarn, color: 'a-yellow' });
    const broken = machines.filter(s => s.working_properly === false).map(s => s.name || `#${s.id}`);
    if (broken.length) alerts.push({ label: '⚠️ Not Working', ids: broken, color: 'a-orange' });
    if (!alerts.length) { wrap.innerHTML = ''; return; }
    let html = '<div id="alerts" style="margin:8px 0 0">';
    html += '<div id="alerts-header"><span class="dot"></span>Active alerts</div>';
    for (const a of alerts)
      html += `<div class="alert-row"><span class="alert-label ${a.color}">${a.label}</span><div class="alert-pills">${a.ids.map(id => `<span class="alert-pill ${a.color}">${id}</span>`).join('')}</div></div>`;

  function renderCloreGpuSummary(machines) {
    const wrap = document.getElementById('clore-gpu-summary');
    const counts = {};
    let totalWatts = 0;
    for (const s of machines) {
      for (const gpuName of (s.gpu_array || [])) {
        const match = gpuName?.match(/\b([2-5]\d{3})(?:\s*(Ti|Super))?/i);
        if (match) {
          const suffix = match[2] ? ` ${match[2].charAt(0).toUpperCase()}${match[2].slice(1).toLowerCase()}` : '';
          counts[match[1] + suffix] = (counts[match[1] + suffix] ?? 0) + 1;
        }
      }
      if (s.hive?.total_power_w) totalWatts += s.hive.total_power_w;
    }
    const entries = Object.entries(counts).sort((a, b) => parseInt(a[0]) - parseInt(b[0]));
    if (!entries.length) { wrap.innerHTML = ''; return; }
    const pills = entries.map(([m, c]) => `<span class="gpu-pill">RTX ${m} × ${c}</span>`).join('');
    const powerBox = totalWatts > 0 ? `<div class="gpu-box"><div class="gpu-box-header">Power</div><span class="gpu-power-value">${Math.round(totalWatts)}W</span></div>` : '';
    wrap.innerHTML = `${powerBox}<div class="gpu-box" style="flex:1"><div class="gpu-box-header">GPUs</div><div>${pills}</div></div>`;
  }
