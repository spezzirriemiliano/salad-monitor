<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salad Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --green:     #3fb950;
      --yellow:    #d29922;
      --orange:    #e3742b;
      --red:       #f85149;
      --blue:      #58a6ff;
      --purple:    #bc8cff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", monospace;
      font-size: 13px;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    header h1 { font-size: 16px; font-weight: 600; letter-spacing: .5px; }
    .badge {
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      background: #21262d;
      border: 1px solid var(--border);
    }
    .badge.green  { color: var(--green);  border-color: var(--green); }
    .badge.yellow { color: var(--yellow); border-color: var(--yellow); }
    .badge.red    { color: var(--red);    border-color: var(--red); }
    #last-update  { color: var(--muted); font-size: 12px; }
    #countdown    { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
    #badges-row, #status-row { display: flex; gap: 8px; align-items: center; }
    #status-row { margin-left: auto; }
    @media (max-width: 600px) {
      header { flex-direction: column; align-items: flex-start; gap: 8px; }
      #status-row { margin-left: 0; }
    }
    button#refresh-btn,
    button#autoreload-btn,
    button#telegram-btn {
      background: #21262d;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: background .15s, color .15s, border-color .15s;
    }
    button#refresh-btn:hover,
    button#autoreload-btn:hover,
    button#telegram-btn:hover { background: #30363d; }
    button#autoreload-btn.on { color: var(--green); border-color: rgba(63,185,80,.5); }
    button#autoreload-btn.off { color: var(--muted); }
    button#telegram-btn.on  { color: var(--green); border-color: rgba(63,185,80,.5); }
    button#telegram-btn.off { color: var(--muted); }

    /* ── GPU summary ── */
    #gpu-summary {
      padding: 12px 20px 0;
      display: flex;
      gap: 12px;
    }
    .gpu-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .gpu-box-header {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .gpu-power-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--blue);
      font-family: monospace;
      font-variant-numeric: tabular-nums;
    }
    #gpu-summary-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .gpu-pill {
      background: rgba(88,166,255,.1);
      border: 1px solid rgba(88,166,255,.3);
      color: var(--blue);
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      font-family: monospace;
    }

    /* ── Sort controls ── */
    #sort-bar {
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }
    #sort-bar label {
      font-size: 12px;
      color: var(--muted);
    }
    #sort-bar select {
      background: #21262d;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      outline: none;
      transition: border-color .15s;
    }
    #sort-bar select:hover { border-color: #8b949e; }
    #sort-bar button {
      background: #21262d;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: background .15s, color .15s, border-color .15s;
      margin-left: auto;
    }
    #sort-bar button:hover { background: #30363d; color: var(--text); }
    #sort-bar button.on { color: var(--blue); border-color: rgba(88,166,255,.5); }
    body.hide-salad-id .salad-id-row { display: none !important; }

    /* ── Grid ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
      padding: 16px 20px;
    }
    #grid.view-compact { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }

    /* ── View levels ── */
    .extra { display: none; flex-direction: column; gap: 6px; }
    #grid.view-detailed .extra { display: flex; }
    #grid.view-compact .normal-only { display: none !important; }
    #grid.view-compact .card { padding: 10px 12px; gap: 6px; }
    .compact-only { display: none; }
    #grid.view-compact .compact-only { display: inline; }

    /* ── View toggle button group ── */
    .view-btns {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .view-btn {
      background: #21262d;
      border: none;
      border-right: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 11px;
      cursor: pointer;
      font-size: 12px;
      transition: background .15s, color .15s;
    }
    .view-btn:last-child { border-right: none; }
    .view-btn.active { background: #388bfd22; color: var(--blue); font-weight: 600; }
    .view-btn:hover:not(.active) { background: #262c33; color: var(--text); }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color .2s;
    }
    .card.online             { border-left: 3px solid var(--green); }
    .card.online.no-earning  { border-left: 3px solid var(--orange); }
    .card.offline { border-left: 3px solid var(--red);   opacity: .85; }
    .card.stale   { border-left: 3px solid var(--yellow); opacity: .55; }
    .card.never   { border-left: 3px solid var(--border); opacity: .5; }

    .card-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }
    .card-header-top {
      display: flex;
      align-items: center;
      gap: 4px;
      width: 100%;
      justify-content: space-between;
    }
    .card-header-badges {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .machine-id {
      font-size: 15px;
      font-weight: 700;
      font-family: monospace;
      letter-spacing: .5px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-all;
      width: 100%;
    }
    .salad-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .salad-badge.on  { background: rgba(63,185,80,.15); color: var(--green); }
    .salad-badge.off { background: rgba(248,81,73,.15);  color: var(--red); }

    .hostname { color: var(--muted); font-size: 11px; margin-top: -6px; }

    .earning-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(63,185,80,.12);
      color: var(--green);
      border: 1px solid rgba(63,185,80,.3);
      font-variant-numeric: tabular-nums;
      width: max-content;
    }
    .earning-badge.dim  { background: rgba(139,148,158,.08); color: var(--muted); border-color: var(--border); font-weight: 400; }
    .earning-badge.zero { background: rgba(227,116,43,.12); color: var(--orange); border-color: rgba(227,116,43,.4); }

    /* ── Sections ── */
    .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    /* ── Rows ── */
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .row .label { color: var(--muted); min-width: 46px; }
    .row .val   { font-weight: 600; text-align: right; font-variant-numeric: tabular-nums; }

    .ok     { color: var(--text); }
    .warm   { color: var(--yellow); }
    .hot    { color: var(--orange); }
    .crit   { color: var(--red); }
    .good   { color: var(--green); }
    .info   { color: var(--blue); }

    /* ── Progress bar ── */
    .bar-wrap {
      flex: 1;
      height: 5px;
      background: #21262d;
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--blue);
      transition: width .4s ease;
    }
    .bar-fill.green   { background: var(--green); }
    .bar-fill.yellow  { background: var(--yellow); }
    .bar-fill.orange  { background: var(--orange); }
    .bar-fill.red     { background: var(--red); }
    .bar-fill.neutral { background: #4a5568; }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0;
    }

    /* ── Tags ── */
    .tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag  {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      background: #21262d;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .tag.warn { color: var(--yellow); border-color: var(--yellow); background: rgba(210,153,34,.1); }
    .tag.crit { color: var(--red);    border-color: var(--red);    background: rgba(248,81,73,.1); }

    /* ── Footer ── */
    .card-footer { color: var(--muted); font-size: 11px; text-align: right; }

    /* ── Never / Stale overlay text ── */
    .never-text { color: var(--muted); font-size: 13px; text-align: center; padding: 10px 0; }

    /* ── Loading ── */
    #loading {
      text-align: center;
      padding: 60px;
      color: var(--muted);
      font-size: 15px;
    }

    /* ── Earnings Summary ── */
    #earnings-summary {
      padding: 12px 20px 0;
    }
    .earnings-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      display: flex;
      gap: 24px;
      align-items: center;
      flex-wrap: wrap;
    }
    .earnings-stat {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .earnings-stat .e-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }
    .earnings-stat .e-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--green);
      font-variant-numeric: tabular-nums;
      font-family: monospace;
    }
    .earnings-divider {
      width: 1px;
      height: 32px;
      background: var(--border);
    }
    .earnings-divider.strong {
      width: 2px;
      height: 40px;
      background: #444c56;
      border-radius: 1px;
    }
    .earnings-arrow {
      color: var(--muted);
      font-size: 14px;
      align-self: center;
      padding-bottom: 2px;
    }
    .earnings-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .earnings-bar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    @media (max-width: 600px) {
      .earnings-bar { flex-direction: column; align-items: flex-start; gap: 10px; }
      .earnings-bar > .earnings-divider.strong { display: none; }
      .earnings-bar-right { margin-left: 0; }
    }
    .balance-stat {
      display: flex;
      flex-direction: column;
      gap: 1px;
      align-items: flex-end;
    }
    .balance-stat .e-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
    .balance-stat .e-value { font-size: 18px; font-weight: 700; color: var(--blue); font-variant-numeric: tabular-nums; font-family: monospace; }
    .eye-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 16px;
      padding: 4px;
      line-height: 1;
      transition: color .15s;
    }
    .eye-btn:hover { color: var(--text); }

    /* ── Cookie warning banner ── */
    #cookie-banner {
      display: none;
      margin: 12px 20px 0;
      background: rgba(248,81,73,.08);
      border: 1px solid rgba(248,81,73,.4);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--red);
    }
    #cookie-banner.hidden { display: none !important; }
    #cookie-banner .banner-icon { font-size: 18px; flex-shrink: 0; }
    #cookie-banner .banner-text { flex: 1; }
    #cookie-banner .banner-cmd {
      font-family: monospace;
      background: rgba(248,81,73,.12);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    /* ── Alert Summary ── */
    #alerts-wrap {
      padding: 12px 20px 0;
    }
    #alerts {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #alerts-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    #alerts-header .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); display: inline-block; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .alert-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .alert-label {
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      min-width: 120px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .alert-label.a-red       { color: var(--red); }
    .alert-label.a-orange    { color: var(--orange); }
    .alert-label.a-yellow    { color: var(--yellow); }
    .alert-label.a-dim-orange { color: #a0622a; }
    .alert-pills { display: flex; flex-wrap: wrap; gap: 4px; }
    .alert-pill {
      font-size: 11px;
      font-family: monospace;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .alert-pill.a-red        { background: rgba(248,81,73,.12);  color: var(--red);    border: 1px solid rgba(248,81,73,.35); }
    .alert-pill.a-orange     { background: rgba(227,116,43,.12); color: var(--orange); border: 1px solid rgba(227,116,43,.35); }
    .alert-pill.a-yellow     { background: rgba(210,153,34,.12); color: var(--yellow); border: 1px solid rgba(210,153,34,.35); }
    .alert-pill.a-green      { background: rgba(63,185,80,.15);  color: var(--green);  border: 1px solid rgba(63,185,80,.4); }
    .alert-pill.a-dim-orange { background: rgba(227,116,43,.07); color: #a0622a;       border: 1px solid rgba(227,116,43,.2); }

    /* ── Version badge ── */
    .version-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      background: rgba(63,185,80,.1);
      color: var(--green);
      border: 1px solid rgba(63,185,80,.3);
      font-family: monospace;
    }
    .version-badge.outdated {
      color: var(--orange);
      border-color: rgba(227,116,43,.4);
      background: rgba(227,116,43,.1);
    }
  </style>
</head>
<body>

<header>
  <h1>⚡ Salad Monitor</h1>
  <div id="badges-row">
    <span id="active-badge" class="badge">—</span>
    <span id="earning-badge" class="badge">—</span>
  </div>
  <div id="status-row">
    <button id="telegram-btn" onclick="toggleTelegram()">Telegram notifications: —</button>
    <button id="autoreload-btn" onclick="toggleAutoReload()">Auto refresh: ON</button>
    <button id="refresh-btn" onclick="fetchData()">↻ Refresh</button>
    <span id="last-update">—</span>
    <span id="countdown"></span>
  </div>
  <div class="view-btns">
    <button class="view-btn" onclick="setView(0)">Compact</button>
    <button class="view-btn" onclick="setView(1)">Normal</button>
    <button class="view-btn" onclick="setView(2)">Detailed</button>
  </div>
</header>

<div id="cookie-banner" class="hidden">
  <span class="banner-icon">⚠️</span>
  <span class="banner-text" id="cookie-banner-text"></span>
</div>
<div id="earnings-summary"></div>
<div id="gpu-summary"></div>
<div id="alerts-wrap"></div>
<div id="sort-bar">
  <label>Sort by</label>
  <select id="sort-field" onchange="applySortAndRender()">
    <option value="name">PC Name</option>
    <option value="earning">Earnings</option>
    <option value="gpu_temp">GPU Temp</option>
    <option value="gpu_power">GPU Power</option>
  </select>
  <select id="sort-dir" onchange="applySortAndRender()">
    <option value="asc">ASC</option>
    <option value="desc">DESC</option>
  </select>
  <button id="saladid-btn" onclick="toggleSaladId()">Salad ID: Hide</button>
</div>
<div id="grid"><div id="loading">Loading data...</div></div>

<script>
  let countdown    = 30;
  let timer;
  let autoReload   = localStorage.getItem('autoReload') !== 'false';
  let lastMachines = [];

  function toggleAutoReload() {
    autoReload = !autoReload;
    localStorage.setItem('autoReload', autoReload);
    applyAutoReload();
    if (autoReload) fetchData();
  }

  async function fetchTelegramStatus() {
    try {
      const r = await fetch('/api/telegram');
      const d = await r.json();
      applyTelegramBtn(d.enabled);
    } catch(_) {}
  }

  async function toggleTelegram() {
    const btn = document.getElementById('telegram-btn');
    const currentlyOn = btn.classList.contains('on');
    applyTelegramBtn(!currentlyOn);
    try {
      const r = await fetch('/api/telegram', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ enabled: !currentlyOn })
      });
      const d = await r.json();
      applyTelegramBtn(d.enabled);
    } catch(e) {
      applyTelegramBtn(currentlyOn);
      console.error('Telegram toggle failed:', e);
    }
  }

  function applyTelegramBtn(enabled) {
    const btn = document.getElementById('telegram-btn');
    btn.textContent = `Telegram notifications: ${enabled ? 'ON' : 'OFF'}`;
    btn.classList.toggle('on', enabled);
    btn.classList.toggle('off', !enabled);
  }

  function sortMachines(machines) {
    const field = document.getElementById('sort-field').value;
    const dir   = document.getElementById('sort-dir').value;
    const mult  = dir === 'asc' ? 1 : -1;

    const val = m => {
      if (field === 'name')      return m.machine_id ?? '';
      if (field === 'earning')   return m.earning_rate ?? -1;
      if (field === 'gpu_temp')  return (m.gpus?.[0]?.temperature_c) ?? -1;
      if (field === 'gpu_power') return (m.gpus?.[0]?.power_w) ?? -1;
      return 0;
    };

    return [...machines].sort((a, b) => {
      const av = val(a), bv = val(b);
      if (typeof av === 'string') return mult * av.localeCompare(bv);
      return mult * (av - bv);
    });
  }

  function applySortAndRender() {
    const field = document.getElementById('sort-field').value;
    const dir   = document.getElementById('sort-dir').value;
    localStorage.setItem('sortField', field);
    localStorage.setItem('sortDir', dir);
    const grid = document.getElementById('grid');
    if (!lastMachines.length) return;
    grid.innerHTML = sortMachines(lastMachines).map(renderCard).join('');
    applyView();
  }

  let saladIdVisible = localStorage.getItem('saladIdVisible') !== 'false';

  function toggleSaladId() {
    saladIdVisible = !saladIdVisible;
    localStorage.setItem('saladIdVisible', saladIdVisible);
    applySaladIdBtn();
  }

  function applySaladIdBtn() {
    const btn = document.getElementById('saladid-btn');
    btn.textContent = `Salad ID: ${saladIdVisible ? 'Show' : 'Hide'}`;
    btn.classList.toggle('on', saladIdVisible);
    document.body.classList.toggle('hide-salad-id', !saladIdVisible);
  }

  function applySavedSort() {
    const field = localStorage.getItem('sortField');
    const dir   = localStorage.getItem('sortDir');
    if (field) document.getElementById('sort-field').value = field;
    if (dir)   document.getElementById('sort-dir').value   = dir;
  }

  function applyAutoReload() {
    const btn = document.getElementById('autoreload-btn');
    if (autoReload) {
      btn.textContent = 'Auto refresh: ON';
      btn.classList.replace('off', 'on') || btn.classList.add('on');
    } else {
      btn.textContent = 'Auto refresh: OFF';
      btn.classList.replace('on', 'off') || btn.classList.add('off');
      clearInterval(timer);
      document.getElementById('countdown').textContent = '';
    }
  }
  let viewLevel      = parseInt(localStorage.getItem('viewLevel') ?? '1');
  let balanceVisible = localStorage.getItem('balanceVisible') === 'true';
  const eyeOpenSvg = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  const eyeOffSvg  = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

  function toggleBalance() {
    balanceVisible = !balanceVisible;
    localStorage.setItem('balanceVisible', balanceVisible);
    renderBalanceVisibility();
  }

  function renderBalanceVisibility() {
    const els = document.querySelectorAll('.balance-val');
    els.forEach(el => { el.textContent = balanceVisible ? el.dataset.val : '••••••'; });
    const btn = document.getElementById('balance-eye-btn');
    if (btn) btn.innerHTML = balanceVisible ? eyeOpenSvg : eyeOffSvg;
  }

  function applyView() {
    const grid = document.getElementById('grid');
    grid.classList.remove('view-compact', 'view-normal', 'view-detailed');
    grid.classList.add(['view-compact', 'view-normal', 'view-detailed'][viewLevel]);
    document.querySelectorAll('.view-btn').forEach((btn, i) => {
      btn.classList.toggle('active', i === viewLevel);
    });
  }

  function setView(level) {
    viewLevel = level;
    localStorage.setItem('viewLevel', level);
    applyView();
  }

  function fmt(v, decimals=0) {
    if (v == null) return '—';
    return decimals > 0 ? Number(v).toFixed(decimals) : Math.round(v);
  }

  function tempClass(t) {
    if (t == null) return 'ok';
    if (t >= 85) return 'crit';
    if (t >= 80) return 'hot';
    if (t >= 70) return 'warm';
    return 'ok';
  }

  function barColor(pct) {
    if (pct >= 95) return 'red';
    if (pct >= 80) return 'orange';
    if (pct >= 60) return 'yellow';
    return 'green';
  }

  function powerClass(power, limit, throttles) {
    if (throttles && throttles.includes('power_cap')) return 'warm';
    if (power && limit && power / limit >= 0.98) return 'crit';
    return 'ok';
  }

  function timeAgo(isoStr) {
    if (!isoStr) return '—';
    const diff = Math.floor((Date.now() - new Date(isoStr)) / 1000);
    if (diff < 60)  return `${diff}s ago`;
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    return `${Math.floor(diff/3600)}h ago`;
  }

  function uptimeFmt(h) {
    if (h == null) return '—';
    const d = Math.floor(h / 24), rem = Math.round(h % 24);
    return d > 0 ? `${d}d ${rem}h` : `${Math.round(h)}h`;
  }

  function barRow(label, pct, valStr, colorFn) {
    const color = typeof colorFn === 'function' ? colorFn(pct) : colorFn;
    const w = Math.min(100, Math.max(0, pct || 0));
    return `
      <div class="row">
        <span class="label">${label}</span>
        <div class="bar-wrap"><div class="bar-fill ${color}" style="width:${w}%"></div></div>
        <span class="val ${color === 'red' ? 'crit' : color === 'orange' ? 'hot' : color === 'yellow' ? 'warm' : 'ok'}">${valStr}</span>
      </div>`;
  }

  function renderGpu(g) {
    if (!g) return '<div class="never-text">No GPU data</div>';

    const tc  = tempClass(g.temperature_c);
    const pc  = powerClass(g.power_w, g.power_limit_w, g.throttle_reasons);
    const pct = g.memory_total_mb ? Math.round(g.memory_used_mb / g.memory_total_mb * 100) : null;

    const powerStr = g.power_w != null
      ? (g.power_limit_w != null ? `${g.power_w}/${g.power_limit_w}W` : `${g.power_w}W`)
      : '—';

    const clockStr = g.clock_sm_mhz != null
      ? `${g.clock_sm_mhz}/${g.clock_sm_max_mhz ?? '?'}MHz`
      : '—';

    const perf = g.perf_state != null ? `P${g.perf_state}` : '—';

    const tempBarColor = tc === 'crit' ? 'red' : tc === 'hot' ? 'orange' : tc === 'warm' ? 'yellow' : 'green';

    let html = `<div class="section-label">GPU · ${g.name ?? '—'}</div>`;

    // ── Basic: Temp, Load, Fan ──
    html += `
      <div class="row">
        <span class="label">Temp</span>
        <div class="bar-wrap"><div class="bar-fill ${tempBarColor}" style="width:${Math.min(100,(g.temperature_c??0)/110*100)}%"></div></div>
        <span class="val ${tc}">${g.temperature_c != null ? g.temperature_c+'°C' : '—'}</span>
      </div>`;
    html += barRow('Load', g.utilization_pct, `${fmt(g.utilization_pct)}%`, 'neutral');
    html += `
      <div class="row">
        <span class="label">Fan</span>
        <div class="bar-wrap"><div class="bar-fill neutral" style="width:${Math.min(100, g.fan_speed_pct ?? 0)}%"></div></div>
        <span class="val">${g.fan_speed_pct != null ? g.fan_speed_pct+'%' : '—'}</span>
      </div>`;

    // ── Detalle: VRAM, Watts, throttle ──
    html += `<div class="extra" style="flex-direction:column;gap:6px;margin-top:4px">`;
    html += barRow('VRAM', pct, `${fmt(pct)}% · ${fmt(g.memory_used_mb)}/${fmt(g.memory_total_mb)}MB`, barColor);
    html += `
      <div class="row">
        <span class="label">Watts</span>
        <span class="val ${pc}" style="flex:1;text-align:right">${powerStr}</span>
      </div>`;
    html += `</div>`;

    return html;
  }

  function renderEarningsSummary(data) {
    const wrap = document.getElementById('earnings-summary');
    if (data.earnings_24h == null && data.earnings_30d == null) { wrap.innerHTML = ''; return; }

    // ── Left group: Last 24h | Last 30 days ──
    const leftHtml = `
      <div class="earnings-stat">
        <span class="e-label">Last 24h</span>
        <span class="e-value">$${(data.earnings_24h ?? 0).toFixed(2)}</span>
      </div>
      <div class="earnings-divider"></div>
      <div class="earnings-stat">
        <span class="e-label">Last 30 days</span>
        <span class="e-value">$${(data.earnings_30d ?? 0).toFixed(2)}</span>
      </div>`;

    // ── Right group: Last 1h → Est. 24h ──
    const h1  = data.earnings_1h  ?? 0;
    const est = h1 * 24;
    const rightHtml = `
      <div class="earnings-stat">
        <span class="e-label">Last 1h</span>
        <span class="e-value" style="color:var(--purple)">$${h1.toFixed(2)}</span>
      </div>
      <span class="earnings-arrow">→</span>
      <div class="earnings-stat">
        <span class="e-label">Est. next 24h</span>
        <span class="e-value" style="color:var(--purple)">$${est.toFixed(2)}</span>
      </div>`;

    // ── Balance ──
    const hasCurrent  = data.balance_current  != null;
    const hasLifetime = data.balance_lifetime != null;
    const curVal  = hasCurrent  ? `$${data.balance_current.toFixed(2)}`  : null;
    const lifeVal = hasLifetime ? `$${data.balance_lifetime.toFixed(2)}` : null;
    const balanceHtml = (hasCurrent || hasLifetime) ? `
      <div class="earnings-bar-right">
        ${hasCurrent ? `
        <div class="balance-stat">
          <span class="e-label">Current balance</span>
          <span class="e-value balance-val" data-val="${curVal}">${balanceVisible ? curVal : '••••••'}</span>
        </div>` : ''}
        ${hasCurrent && hasLifetime ? `<div class="earnings-divider"></div>` : ''}
        ${hasLifetime ? `
        <div class="balance-stat">
          <span class="e-label">Lifetime</span>
          <span class="e-value balance-val" data-val="${lifeVal}">${balanceVisible ? lifeVal : '••••••'}</span>
        </div>` : ''}
        <button class="eye-btn" id="balance-eye-btn" onclick="toggleBalance()" title="Show/hide balance">${balanceVisible ? eyeOpenSvg : eyeOffSvg}</button>
      </div>` : '';

    wrap.innerHTML = `
      <div class="earnings-bar">
        <div class="earnings-group">${leftHtml}</div>
        <div class="earnings-divider strong"></div>
        <div class="earnings-group">${rightHtml}</div>
        ${balanceHtml}
      </div>`;
  }

  function renderGpuSummary(machines) {
    const wrap = document.getElementById('gpu-summary');
    const counts = {};
    for (const m of machines) {
      for (const gpu of (m.gpus ?? [])) {
        const match = gpu.name?.match(/\b([2-5]\d{3})(?:\s+(Ti|Super))?/i);
        if (match) {
          const suffix = match[2] ? ` ${match[2].charAt(0).toUpperCase()}${match[2].slice(1).toLowerCase()}` : '';
          const model = match[1] + suffix;
          counts[model] = (counts[model] ?? 0) + 1;
        }
      }
    }
    const entries = Object.entries(counts).sort((a, b) => parseInt(a[0]) - parseInt(b[0]));
    if (!entries.length) { wrap.innerHTML = ''; return; }
    const pills = entries.map(([model, count]) =>
      `<span class="gpu-pill">RTX ${model} × ${count}</span>`
    ).join('');
    let totalWatts = 0, wattsCount = 0;
    for (const m of machines) {
      const gpu = m.gpus && m.gpus.length > 0 ? m.gpus[0] : null;
      if (gpu && gpu.power_w != null) { totalWatts += gpu.power_w; wattsCount++; }
    }
    const powerBox = wattsCount > 0 ? `
      <div class="gpu-box">
        <div class="gpu-box-header">Power</div>
        <span class="gpu-power-value">${Math.round(totalWatts)}W</span>
      </div>` : '';
    const gpusBox = `
      <div class="gpu-box" style="flex:1">
        <div class="gpu-box-header">GPUs</div>
        <div id="gpu-summary-pills">${pills}</div>
      </div>`;
    wrap.innerHTML = `${powerBox}${gpusBox}`;
  }

  function renderAlerts(machines) {
    const alerts = [];

    const offline = machines.filter(m => m.status === 'offline').map(m => m.machine_id);
    if (offline.length) alerts.push({ label: '🔴 Offline', ids: offline, color: 'a-red' });

    const stale = machines.filter(m => m.status === 'stale').map(m => m.machine_id);
    if (stale.length) alerts.push({ label: '🟡 Agent not active', ids: stale, color: 'a-yellow' });

    const saladOff = machines.filter(m =>
      (m.status === 'online' || m.status === 'stale') && m.salad_running === false
    ).map(m => m.machine_id);
    if (saladOff.length) alerts.push({ label: '⚠️ Salad OFF', ids: saladOff, color: 'a-orange' });

const gpuHot = machines.filter(m => {
      const gpu = m.gpus && m.gpus.length > 0 ? m.gpus[0] : null;
      return gpu && gpu.temperature_c >= 80;
    }).map(m => m.machine_id);
    if (gpuHot.length) alerts.push({ label: '🔥 GPU Temp', ids: gpuHot, color: 'a-red' });

    const noEarning = machines.filter(m =>
      m.earning_rate != null && m.earning_rate < 0.001
    ).map(m => m.machine_id);
    if (noEarning.length) alerts.push({ label: '💸 No Earning', ids: noEarning, color: 'a-orange' });

    const outdatedMachines = machines.filter(m =>
      m.salad_version && isOutdated(m.salad_version, latestSaladVersion)
    );
    if (outdatedMachines.length) {
      const noEarningSet = new Set(noEarning);
      alerts.push({
        label: `⬆️ Update to v${latestSaladVersion}`,
        pills: outdatedMachines.map(m => ({
          id: m.machine_id,
          color: noEarningSet.has(m.machine_id) ? 'a-green' : 'a-dim-orange',
        })),
      });
    }

    const wrap = document.getElementById('alerts-wrap');
    if (!alerts.length) { wrap.innerHTML = ''; return; }

    let html = '<div id="alerts">';
    html += '<div id="alerts-header"><span class="dot"></span>Active alerts</div>';
    for (const a of alerts) {
      const pillsHtml = a.pills
        ? a.pills.map(p => `<span class="alert-pill ${p.color}">${p.id}</span>`).join('')
        : a.ids.map(id => `<span class="alert-pill ${a.color}">${id}</span>`).join('');
      const labelColor = a.pills ? 'a-dim-orange' : a.color;
      html += `<div class="alert-row"><span class="alert-label ${labelColor}">${a.label}</span><div class="alert-pills">${pillsHtml}</div></div>`;
    }
    html += '</div>';
    wrap.innerHTML = html;
  }

  let latestSaladVersion = null;

  function parseVersion(v) {
    // "1.9.13.20260324.3" or "1.9.13" → compare first 3 parts
    if (!v) return null;
    return v.split('.').slice(0, 3).map(Number);
  }

  function isOutdated(machineVer, latestVer) {
    if (!machineVer || !latestVer) return false;
    const mv = parseVersion(machineVer);
    const lv = parseVersion(latestVer);
    if (!mv || !lv) return false;
    for (let i = 0; i < 3; i++) {
      if ((mv[i] ?? 0) < (lv[i] ?? 0)) return true;
      if ((mv[i] ?? 0) > (lv[i] ?? 0)) return false;
    }
    return false;
  }

  function renderCard(m) {
    const noEarning = m.status === 'online' && m.earning_rate != null && m.earning_rate < 0.001;
    const statusIcon = noEarning ? '🟠' : ({online:'🟢', offline:'🔴', stale:'🟡', never:'⚫'}[m.status] ?? '⚫');
    const saladClass = m.salad_running ? 'on' : 'off';
    const saladText  = m.salad_running ? 'Salad ON' : 'Salad OFF';
    const gpu = m.gpus && m.gpus.length > 0 ? m.gpus[0] : null;

    let html = `<div class="card ${m.status}${noEarning ? ' no-earning' : ''}">`;

    // Header
    const gpuTemp = gpu ? gpu.temperature_c : null;
    const hotGpu  = gpuTemp != null && gpuTemp >= 80;
    const fireHtml = hotGpu ? `<span style="font-size:14px">🔥</span>` : '';
    const earnHtml = m.earning_rate != null
      ? `<span class="earning-badge ${m.earning_rate < 0.001 ? 'zero' : ''}">💰 $${m.earning_rate.toFixed(2)}/hr</span>`
      : '';
    html += `
      <div class="card-header">
        <div class="card-header-top">
          <span style="font-size:14px">${statusIcon}</span>
          <div class="card-header-badges">
            ${fireHtml}${earnHtml}
            <span class="salad-badge ${saladClass} normal-only">${saladText}</span>
            <span class="salad-badge ${saladClass} compact-only">${m.salad_running ? 'ON' : 'OFF'}</span>
          </div>
        </div>
        <span class="machine-id">${m.machine_id}</span>
      </div>`;
    if (m.cpu_name) html += `<div class="hostname normal-only">${m.cpu_name}</div>`;
    if (m.ram_total_gb) html += `<div class="hostname normal-only">${Math.round(m.ram_total_gb)}GB RAM</div>`;

    if (m.status === 'never') {
      html += `<div class="never-text normal-only">No data</div>`;
      html += `</div>`;
      return html;
    }

    html += `<hr class="divider normal-only">`;

    // GPU
    html += `<div class="normal-only">${renderGpu(gpu)}</div>`;

    // Sistema (en detalle)
    html += `<div class="extra" style="flex-direction:column;gap:6px">`;
    html += `<hr class="divider">`;
    html += `<div class="section-label">System</div>`;
    html += barRow('CPU', m.cpu_pct, `${fmt(m.cpu_pct)}%`, barColor);
    const ramStr = m.ram_used_gb != null
      ? `${fmt(m.ram_used_pct)}% · ${fmt(m.ram_used_gb,1)}/${fmt(m.ram_total_gb,1)}GB`
      : `${fmt(m.ram_used_pct)}%`;
    html += barRow('RAM', m.ram_used_pct, ramStr, barColor);
    html += barRow('Disk', m.disk_used_pct, `${fmt(m.disk_used_pct)}%`, barColor);
    html += `
      <div class="row">
        <span class="label">Uptime</span>
        <span class="val">${uptimeFmt(m.uptime_hours)}</span>
      </div>`;
    html += `</div>`;

    html += `<hr class="divider normal-only">`;
    if (m.salad_version) {
      const outdated = isOutdated(m.salad_version, latestSaladVersion);
      const verDisplay = m.salad_version.split('.').slice(0, 3).join('.');
      const verLabel = `Salad v${verDisplay}${outdated ? ' ⚠️' : ''}`;
      const timeStyle = m.status === 'stale' ? 'color:var(--red)' : '';
      html += `<div class="card-footer normal-only" style="display:flex;justify-content:space-between;align-items:center">
        <span class="version-badge${outdated ? ' outdated' : ''}">${verLabel}</span>
        <span style="${timeStyle}">${timeAgo(m.last_seen)}</span>
      </div>`;
    } else {
      const timeStyle = m.status === 'stale' ? `style="color:var(--red)"` : '';
      html += `<div class="card-footer normal-only" ${timeStyle}>${timeAgo(m.last_seen)}</div>`;
    }
    if (m.salad_machine_id) {
      html += `<div class="salad-id-row" style="margin-top:2px">
        <span style="color:var(--muted);font-size:10px;font-family:monospace;letter-spacing:.3px">Id: ${m.salad_machine_id}</span>
      </div>`;
    } else {
      html += `<div class="salad-id-row" style="margin-top:2px">
        <span style="color:var(--red);font-size:10px;font-family:monospace;letter-spacing:.3px">⚠ salad_machine_id not configured</span>
      </div>`;
    }
    html += `</div>`;
    return html;
  }

  async function fetchData() {
    clearInterval(timer);
    countdown = 30;

    try {
      const res = await fetch('/api/dashboard');
      if (!res.ok) throw new Error(res.statusText);
      const data = await res.json();

      latestSaladVersion = data.latest_salad_version || null;

      // Cookie banner
      const banner     = document.getElementById('cookie-banner');
      const bannerText = document.getElementById('cookie-banner-text');
      const status     = data.salad_cookie_status;
      if (status === 'not_configured') {
        bannerText.innerHTML = `Salad API cookie is not configured. Run <span class="banner-cmd">update_credentials.bat</span> in the server folder to set it up.`;
        banner.classList.remove('hidden');
      } else if (status === 'expired') {
        bannerText.innerHTML = `Salad API cookie has expired. Run <span class="banner-cmd">update_credentials.bat</span> in the server folder to update it.`;
        banner.classList.remove('hidden');
      } else {
        banner.classList.add('hidden');
      }

      const telegramBtn = document.getElementById('telegram-btn');
      telegramBtn.style.display = data.telegram_configured ? '' : 'none';
      if (data.telegram_configured) applyTelegramBtn(data.telegram_enabled);

      lastMachines = data.machines;
      renderAlerts(data.machines);
      renderGpuSummary(data.machines);
      renderEarningsSummary(data);
      applySortAndRender();

      const active = data.active_count;
      const total  = data.total_count;
      const badge  = document.getElementById('active-badge');
      badge.textContent = `Active: ${active}/${total}`;
      badge.className = 'badge ' + (active === total ? 'green' : active === 0 ? 'red' : 'yellow');

      const earning     = data.machines.filter(m => m.earning_rate != null && m.earning_rate > 0.001).length;
      const earnBadge   = document.getElementById('earning-badge');
      earnBadge.textContent = `Earning: ${earning}/${total}`;
      earnBadge.className = 'badge ' + (earning === total ? 'green' : earning === 0 ? 'red' : 'yellow');

      const t = new Date(data.server_time);
      document.getElementById('last-update').textContent =
        `Updated: ${t.toLocaleTimeString()}`;

    } catch (e) {
      console.error('Fetch error:', e.message);
    }

    if (autoReload) {
      timer = setInterval(() => {
        countdown--;
        document.getElementById('countdown').textContent = `Next update: ${countdown}s`;
        if (countdown <= 0) fetchData();
      }, 1000);
    } else {
      document.getElementById('countdown').textContent = '';
    }
  }

  applyAutoReload();
  applySavedSort();
  applySaladIdBtn();
  fetchData();
</script>
</body>
</html>
